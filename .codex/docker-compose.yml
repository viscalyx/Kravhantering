services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      idp:
        condition: service_started
    environment:
      AUTH_OIDC_ISSUER_URL: http://localhost:8080/realms/kravhantering-dev
      DATABASE_READONLY_PASSWORD_ENV: DB_READONLY_PASSWORD
      DB_ENCRYPT: "true"
      DB_HOST: db
      DB_NAME: kravhantering
      DB_PORT: "1433"
      DB_READONLY_PASSWORD: ${DB_READONLY_PASSWORD:-BrowseOnly!Passw0rd7}
      DB_READONLY_USER: ${DB_READONLY_USER:-readonly}
      DB_TRUST_SERVER_CERTIFICATE: "true"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
    init: true
    ports:
      - "127.0.0.1:${CODEX_DEV_PORT:-3000}:3000"
      - "127.0.0.1:${CODEX_PRODLIKE_PORT:-3001}:3001"
      - "127.0.0.1:${CODEX_PLAYWRIGHT_REPORT_PORT:-9323}:9323"
      - "127.0.0.1:${CODEX_VITEST_UI_PORT:-51204}:51204"
    volumes:
      - type: bind
        source: ${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH must be set}
        target: /workspace
      - codex-node-modules:/workspace/node_modules
      - codex-npm-cache:/root/.npm
    working_dir: /workspace

  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 5s
      retries: 20
      start_period: 10s
      timeout: 5s
    ports:
      - "127.0.0.1:${CODEX_SQLSERVER_PORT:-1433}:1433"
    volumes:
      - codex-sqlserver-data:/var/opt/mssql

  idp:
    image: quay.io/keycloak/keycloak:26.6.1
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:${CODEX_KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ../dev/keycloak:/opt/keycloak/data/import:ro

volumes:
  codex-node-modules:
  codex-npm-cache:
  codex-sqlserver-data:
