# Shared Codex defaults for every Kravhantering development environment.
# Codex automatically layers the settings on top of the user configuration in ~/.codex/config.tom.

personality = "pragmatic"

model = "gpt-5.6-sol"
model_reasoning_effort = "high"

[mcp_servers.playwright]
args = ["@playwright/mcp@latest"]
command = "npx"

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_click]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_close]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_fill_form]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_tabs]
approval_mode = "approve"

[mcp_servers.github]
enabled = true
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GH_TOKEN"

[mcp_servers.github.tools.issue_write]
approval_mode = "approve"

[mcp_servers.github.tools.add_issue_comment]
approval_mode = "approve"

[mcp_servers.github.tools.sub_issue_write]
approval_mode = "approve"

[tui]
terminal_title = ["activity", "app-name"]
status_line = ["model-with-reasoning", "context-used", "context-window-size", "fast-mode", "permissions", "thread-title"]
status_line_use_colors = true
