version = 1
name = "Kravhantering"

[setup]
script = '''
set -euo pipefail

if [ -n "${CODEX_WORKTREE_PATH:-}" ]; then
  cd "$CODEX_WORKTREE_PATH"
fi

if [ -n "${CODEX_SOURCE_WORKSPACE_PATH:-}" ] && [ -f "$CODEX_SOURCE_WORKSPACE_PATH/.env.sqlserver" ]; then
  cp "$CODEX_SOURCE_WORKSPACE_PATH/.env.sqlserver" .env.sqlserver
elif [ ! -f .env.sqlserver ] && [ -f .env.sqlserver.example ]; then
  cp .env.sqlserver.example .env.sqlserver
fi

CODEX_APP_COMPOSE=1 .codex/compose.sh build app
CODEX_APP_COMPOSE=1 .codex/compose.sh run --rm --no-deps app npm ci --prefer-offline --no-audit
'''

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"

if ($env:CODEX_WORKTREE_PATH) {
  Set-Location $env:CODEX_WORKTREE_PATH
}

$sourceSqlServerEnv = $null
if ($env:CODEX_SOURCE_WORKSPACE_PATH) {
  $sourceSqlServerEnv = Join-Path $env:CODEX_SOURCE_WORKSPACE_PATH ".env.sqlserver"
}

if ($sourceSqlServerEnv -and (Test-Path $sourceSqlServerEnv)) {
  Copy-Item $sourceSqlServerEnv ".env.sqlserver" -Force
} elseif ((-not (Test-Path ".env.sqlserver")) -and (Test-Path ".env.sqlserver.example")) {
  Copy-Item ".env.sqlserver.example" ".env.sqlserver" -Force
}

$env:CODEX_APP_COMPOSE = "1"
& .\.codex\compose.ps1 build app
& .\.codex\compose.ps1 run --rm --no-deps app npm ci --prefer-offline --no-audit
'''

[[actions]]
