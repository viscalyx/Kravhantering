name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dev-server-smoke:
    name: Dev Server Smoke (Developer Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check integration chunk manifest
        run: npm run test:integration:chunks:check

      - name: Clean server and database state
        run: npm run clean:all

      - name: Prepare SQL Server env file
        run: |
          cp .env.sqlserver.ci .env.sqlserver

      - name: Start local database service
        run: npm run db:up

      - name: Setup local SQL Server database
        run: npm run db:setup

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start and wait for local IdP service
        run: npm run idp:up

      - name: Run Developer Mode smoke against dev server
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          set +e
          npm run test:integration -- \
            tests/integration/developer-mode/overlay.spec.ts \
            --grep "DEVTOOLS-01: shows chip on hover and copies a contextual reference"
          test_exit=$?
          set -e
          end_epoch="$(date +%s)"
          duration_seconds=$((end_epoch - start_epoch))
          hours=$((duration_seconds / 3600))
          minutes=$(((duration_seconds % 3600) / 60))
          seconds=$((duration_seconds % 60))
          formatted="$(printf '%02dh %02dm %02ds' "${hours}" "${minutes}" "${seconds}")"
          echo "Dev server smoke runtime: ${formatted} (${duration_seconds}s)"
          {
            echo "### Dev server smoke runtime"
            echo
            echo "- Runtime: ${formatted} (${duration_seconds}s)"
            echo "- Command: \`npm run test:integration -- tests/integration/developer-mode/overlay.spec.ts --grep \"DEVTOOLS-01: shows chip on hover and copies a contextual reference\"\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${test_exit}"
        env:
          CI: true

      - name: Upload test results (dev smoke)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-dev-smoke
          path: playwright-report-dev/
          retention-days: 7

      - name: Upload test results XML (dev smoke)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-junit-dev-smoke
          path: test-results/dev/playwright-junit.xml
          retention-days: 7

      - name: Stop local IdP service
        if: always()
        run: npm run idp:down

      - name: Stop local database service
        if: always()
        run: npm run db:down

  test-prodlike-pruned:
    name: Canonical Playwright Gate (Prod-like, Pruned Dependencies)
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check integration chunk manifest
        run: npm run test:integration:chunks:check

      - name: Clean server and database state
        run: npm run clean:all

      - name: Prepare SQL Server env file
        run: cp .env.sqlserver.ci .env.sqlserver

      - name: Start local database service
        run: npm run db:up

      - name: Setup local SQL Server database
        run: npm run db:setup

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start and wait for local IdP service
        run: npm run idp:up

      - name: Start local HSA lookup fixture
        run: bash scripts/ci-hsa-person-lookup-fixture.sh start "prodlike-pruned"

      # Build with the full devDependency tree so Tailwind can resolve
      # `@import "@viscalyx/developer-mode-react/safelist.css"` from
      # `app/globals.css`. The published `safelist.css` artifact has no
      # JavaScript runtime surface – its `@source inline(...)` declarations
      # are inlined into the emitted CSS bundle, so the package is no
      # longer needed after the build completes.
      - name: Build prod-like bundle (full deps)
        run: npm run build:local-prod
        env:
          ENABLE_ERROR_BOUNDARY_TEST_ROUTE: '1'

      # Snapshot the dev-dep tree, then install a prod-only one in its
      # place. The snapshot is restored after the server is started so the
      # Playwright runner (a devDependency) can execute against the
      # already-running pruned server. Renaming `node_modules` is safe
      # while Node holds open handles to the old tree on Linux.
      - name: Snapshot full node_modules
        run: mv node_modules node_modules.full

      - name: Install production-only dependencies
        run: npm ci --omit=dev

      - name: Start pruned prod-like server
        run: |
          mkdir -p test-results/prodlike-pruned
          nohup npm run start:prodlike-pruned \
            > test-results/prodlike-pruned/server.log 2>&1 &
          echo "$!" > test-results/prodlike-pruned/server.pid
        env:
          ENABLE_ERROR_BOUNDARY_TEST_ROUTE: '1'

      - name: Wait for pruned server to respond
        run: |
          echo "Waiting for prod-like server on http://localhost:3001 ..."
          for i in $(seq 1 60); do
            if curl -sf --max-time 5 -o /dev/null http://localhost:3001/; then
              echo "Pruned server is responding."
              exit 0
            fi
            echo "Attempt $i/60 – not responding yet, retrying in 2s..."
            sleep 2
          done
          echo "Pruned server did not become ready in time."
          echo "----- server.log -----"
          cat test-results/prodlike-pruned/server.log || true
          exit 1

      - name: Restore full node_modules for the test runner
        run: |
          mv node_modules node_modules.prod
          mv node_modules.full node_modules

      - name: Run Playwright tests against pruned prod-like server
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          set +e
          npm run test:integration:prodlike
          test_exit=$?
          set -e
          end_epoch="$(date +%s)"
          duration_seconds=$((end_epoch - start_epoch))
          hours=$((duration_seconds / 3600))
          minutes=$(((duration_seconds % 3600) / 60))
          seconds=$((duration_seconds % 60))
          formatted="$(printf '%02dh %02dm %02ds' "${hours}" "${minutes}" "${seconds}")"
          echo "Integration tests (prodlike-pruned) runtime: ${formatted} (${duration_seconds}s)"
          {
            echo "### Integration test runtime (prodlike-pruned)"
            echo
            echo "- Runtime: ${formatted} (${duration_seconds}s)"
            echo "- Command: \`npm run test:integration:prodlike\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${test_exit}"
        env:
          CI: true
          ENABLE_ERROR_BOUNDARY_TEST_ROUTE: '1'
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
          PLAYWRIGHT_FORCE_AUTH_SETUP: '1'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3001'

      - name: Stop pruned prod-like server
        if: always()
        run: |
          if [ -f test-results/prodlike-pruned/server.pid ]; then
            kill "$(cat test-results/prodlike-pruned/server.pid)" || true
          fi

      - name: Stop local HSA lookup fixture
        if: always()
        run: bash scripts/ci-hsa-person-lookup-fixture.sh stop "prodlike-pruned"

      - name: Upload pruned server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prodlike-pruned-server-log
          path: |
            test-results/prodlike-pruned/server.log
            test-results/hsa-person-lookup/prodlike-pruned.log
          retention-days: 7

      - name: Upload test results (prodlike-pruned)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-prodlike-pruned
          path: playwright-report-prodlike/
          retention-days: 7

      - name: Upload test results XML (prodlike-pruned)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-junit-prodlike-pruned
          path: test-results/prodlike/playwright-junit.xml
          retention-days: 7

      - name: Stop local IdP service
        if: always()
        run: npm run idp:down

      - name: Stop local database service
        if: always()
        run: npm run db:down
