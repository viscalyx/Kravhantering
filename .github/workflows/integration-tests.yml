name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-server:
    name: Test Against ${{ matrix.displayName }} Server
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeoutMinutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - server: dev
            displayName: Dev
            testCommand: npm run test:integration
            timeoutMinutes: 15
            retentionDays: 7
          - server: prodlike
            displayName: Prod-like
            testCommand: npm run test:integration:prodlike
            timeoutMinutes: 25
            retentionDays: 7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean server and database state
        run: npm run clean:all

      - name: Prepare SQL Server env file
        run: |
          cp .env.sqlserver.ci .env.sqlserver
          cat .env.sqlserver
        #   # This uses a well-known password from examples, but it's stored as a
        #   # GitHub Actions variable to avoid hitting any security scanners that
        #   # look for hardcoded secrets.
        #   echo "MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}" >> .env.sqlserver
        # env:
        #   MSSQL_SA_PASSWORD: ${{ vars.MSSQL_SA_PASSWORD }}

      - name: Start local database service
        run: npm run db:up

      - name: Setup local SQL Server database
        run: npm run db:setup
        env:
          MSSQL_SA_PASSWORD: ${{ vars.MSSQL_SA_PASSWORD }}
          DB_HOST: 127.0.0.1
          DB_PORT: 1433
          DB_NAME: kravhantering
          DB_ENCRYPT: 'true'
          DB_TRUST_SERVER_CERTIFICATE: 'true'

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against ${{ matrix.server }} server
        run: ${{ matrix.testCommand }}
        env:
          CI: true
          MSSQL_SA_PASSWORD: ${{ vars.MSSQL_SA_PASSWORD }}
          DB_HOST: 127.0.0.1
          DB_PORT: 1433
          DB_NAME: kravhantering
          DB_ENCRYPT: 'true'
          DB_TRUST_SERVER_CERTIFICATE: 'true'

      - name: Upload test results (${{ matrix.server }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.server }}
          path: playwright-report-${{ matrix.server }}/
          retention-days: ${{ matrix.retentionDays }}

      - name: Upload test results XML (${{ matrix.server }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-junit-${{ matrix.server }}
          path: test-results/${{ matrix.server }}/playwright-junit.xml
          retention-days: ${{ matrix.retentionDays }}

      - name: Stop local database service
        if: always()
        run: npm run db:down

  comment-on-failure:
    name: Comment on PR if tests failed
    if: failure() && github.event_name == 'pull_request'
    needs: [test-server]
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const body = '❌ **Integration tests failed!** Please check the test results and fix any issues.\n\n' +
                        'You can run integration tests locally with:\n' +
                        '- `npm run test:integration` - Test against dev server\n' +
                        '- `npm run test:integration:prodlike` - Test against the built app\n' +
                        '- `npm run test:integration:ui` - Run with Playwright UI for debugging\n\n' +
                        'Check the artifacts for detailed test reports.';

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              core.error(`Failed to create PR comment: ${error.message}`);
            }
