name: Security API

# PR-level REST API contract and property testing against the localhost
# prodlike app. See docs/security-privacy/api-security.md for the design and tuning guide.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '27 4 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  schemathesis:
    name: Schemathesis REST API
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      APP_BASE_URL: http://localhost:3001
      AUTH_SESSION_COOKIE_NAME: kravhantering_session
      KEYCLOAK_USERNAME: ada.admin
      KEYCLOAK_PASSWORD: devpass
      SCHEMATHESIS_VERSION: 4.15.2

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Schemathesis
        run: python -m pip install "schemathesis==${SCHEMATHESIS_VERSION}"

      - name: Start prodlike stack
        uses: ./.github/actions/prodlike-stack
        with:
          results-dir: test-results/security-api

      - name: Acquire authenticated session cookie
        id: session
        uses: ./.github/actions/prodlike-cookie
        with:
          username: ${{ env.KEYCLOAK_USERNAME }}

      - name: Prepare Schemathesis output
        run: |
          set -euo pipefail
          case "${APP_BASE_URL}" in
            http://localhost:3001)
              ;;
            *)
              echo "::error::Refusing to run Schemathesis against target: ${APP_BASE_URL}"
              exit 1
              ;;
          esac
          mkdir -p test-results/schemathesis

      - name: Run Schemathesis REST API scan
        id: schemathesis_scan
        continue-on-error: true
        env:
          SESSION_COOKIE: ${{ steps.session.outputs.cookie }}
        run: |
          set -euo pipefail
          echo "::add-mask::${SESSION_COOKIE}"
          start_epoch="$(date +%s)"
          echo "${start_epoch}" > test-results/schemathesis/start-epoch.txt
          set +e
          schemathesis run openapi/requirements-api.yaml \
            --url "${APP_BASE_URL}" \
            --header "Cookie: ${SESSION_COOKIE}" \
            --header "Origin: ${APP_BASE_URL}" \
            --header "X-Requested-With: XMLHttpRequest" \
            --phases examples,coverage,fuzzing \
            --mode all \
            --max-examples 10 \
            --seed 20260509 \
            --generation-deterministic \
            --request-timeout 5 \
            --request-retries 0 \
            --rate-limit 120/m \
            --max-failures 10 \
            --checks not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance \
            --report junit,ndjson \
            --report-junit-path test-results/schemathesis/junit.xml \
            --report-ndjson-path test-results/schemathesis/events.ndjson \
            --output-sanitize true \
            --no-color \
            > test-results/schemathesis/stdout.log \
            2> test-results/schemathesis/stderr.log
          scan_exit=$?
          set -e
          end_epoch="$(date +%s)"
          duration_seconds=$((end_epoch - start_epoch))
          echo "${end_epoch}" > test-results/schemathesis/end-epoch.txt
          echo "${duration_seconds}" > test-results/schemathesis/duration-seconds.txt
          exit "${scan_exit}"

      - name: Print Schemathesis runtime
        if: always()
        run: |
          set -euo pipefail
          duration_path="test-results/schemathesis/duration-seconds.txt"
          if [ ! -s "${duration_path}" ]; then
            echo "Schemathesis REST API scan runtime: unavailable."
            {
              echo "### Schemathesis runtime"
              echo
              echo "Runtime unavailable; the scan step did not write a duration file."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          duration_seconds="$(cat "${duration_path}")"
          case "${duration_seconds}" in
            ''|*[!0-9]*)
              echo "Schemathesis REST API scan runtime: invalid duration '${duration_seconds}'."
              exit 0
              ;;
          esac

          hours=$((duration_seconds / 3600))
          minutes=$(((duration_seconds % 3600) / 60))
          seconds=$((duration_seconds % 60))
          formatted="$(printf '%02dh %02dm %02ds' "${hours}" "${minutes}" "${seconds}")"

          echo "Schemathesis REST API scan runtime: ${formatted} (${duration_seconds}s)"
          {
            echo "### Schemathesis runtime"
            echo
            echo "- Runtime: ${formatted} (${duration_seconds}s)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print Schemathesis failure summary
        if: always() && steps.schemathesis_scan.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::group::Schemathesis stdout"
          sed -n '1,260p' test-results/schemathesis/stdout.log || true
          echo "::endgroup::"
          echo "::group::Schemathesis stderr"
          sed -n '1,160p' test-results/schemathesis/stderr.log || true
          echo "::endgroup::"
          echo "::group::Schemathesis JUnit failures"
          if [ -f test-results/schemathesis/junit.xml ]; then
            grep -nE "<failure|<error|testcase" test-results/schemathesis/junit.xml | head -n 120 || true
          fi
          echo "::endgroup::"

      - name: Upload Schemathesis artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: schemathesis-api-scan
          path: test-results/schemathesis/**
          retention-days: 14
          if-no-files-found: warn

      - name: Upload API app log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-api-app-log
          path: test-results/security-api/app.log
          retention-days: 14
          if-no-files-found: warn

      - name: Evaluate Schemathesis outcome
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.schemathesis_scan.outcome }}" = "failure" ]; then
            echo "::error::Schemathesis reported API contract or server-error failures."
            exit 1
          fi

      - name: Clean up prodlike stack
        if: always()
        uses: ./.github/actions/prodlike-cleanup
        with:
          results-dir: test-results/security-api
