name: Security DAST

# PR-level dynamic application security test using OWASP ZAP baseline
# (passive scanning) and Nuclei against a localhost authenticated session.
# See docs/security-privacy/security-ci.md for the full design and tuning guide.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  zap-baseline:
    name: Web DAST (ZAP + Nuclei)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_BASE_URL: http://localhost:3001
      KEYCLOAK_USERNAME: ada.admin
      KEYCLOAK_PASSWORD: devpass
      AUTH_SESSION_COOKIE_NAME: kravhantering_session
      NUCLEI_VERSION: v3.8.0

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean server and database state
        run: npm run clean:all

      - name: Prepare SQL Server env file
        run: cp .env.sqlserver.ci .env.sqlserver

      - name: Start local database service
        run: npm run db:up

      - name: Setup local SQL Server database
        run: npm run db:setup

      - name: Start local IdP service
        run: npm run idp:up

      - name: Wait for IdP to be ready
        run: |
          echo "Waiting for Keycloak to be ready..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 http://localhost:8080/realms/kravhantering-dev/.well-known/openid-configuration > /dev/null 2>&1; then
              echo "Keycloak is ready."
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Keycloak did not become ready in time."
          exit 1

      - name: Build prodlike app
        run: npm run build:local-prod

      - name: Start prodlike app
        run: bash scripts/security/prodlike-app.sh start test-results

      - name: Wait for app health endpoint
        run: |
          set -euo pipefail
          # GitHub-hosted ubuntu-latest runners include jq; fail clearly if
          # that runner-image contract changes.
          if ! command -v jq > /dev/null 2>&1; then
            echo "::error::jq is required to validate /api/health JSON."
            exit 1
          fi

          last_http_code="not requested"
          last_payload=""
          for i in $(seq 1 60); do
            response="$(
              curl -sS --max-time 5 -w '\n%{http_code}' \
                "${APP_BASE_URL}/api/health" 2>/dev/null || true
            )"
            last_http_code="$(printf '%s' "$response" | tail -n 1)"
            last_payload="$(printf '%s' "$response" | sed '$d')"

            if [ "$last_http_code" = "200" ]; then
              if printf '%s' "$last_payload" |
                jq -e '.status == "ok"' > /dev/null 2>&1; then
                echo "App is healthy."
                exit 0
              fi
            fi
            echo "Attempt $i/60 - /api/health not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "App did not become healthy in time."
          echo "Last /api/health HTTP status: ${last_http_code}"
          echo "Last /api/health payload:"
          if [ -n "$last_payload" ]; then
            printf '%s\n' "$last_payload"
          else
            echo "<empty>"
          fi
          echo "Last 200 lines of app.log:"
          tail -n 200 test-results/app.log || true
          exit 1

      - name: Acquire authenticated session cookie
        id: session
        run: |
          set -euo pipefail
          COOKIE="$(node scripts/security/get-session-cookie.mjs "${KEYCLOAK_USERNAME}")"
          if [ -z "${COOKIE}" ]; then
            echo "Empty cookie returned from helper" >&2
            exit 1
          fi
          # Mask the cookie value in workflow logs.
          echo "::add-mask::${COOKIE}"
          # Make available to subsequent steps without ever echoing the value.
          {
            echo "cookie<<COOKIE_EOF"
            echo "${COOKIE}"
            echo "COOKIE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stage ZAP rules file for the scenario
        run: |
          set -euo pipefail
          mkdir -p .zap
          # The scan target is the prodlike build, so use the prodlike rule
          # set. Add a sibling rules.<scenario>.tsv when introducing more
          # scan scenarios (e.g. nightly full scan against staging) and
          # select it here per workflow.
          cp .github/zap/rules.prodlike.tsv .zap/rules.tsv

      - name: Run OWASP ZAP baseline scan
        id: zap_scan
        continue-on-error: true
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ env.APP_BASE_URL }}/sv
          rules_file_name: .zap/rules.tsv
          allow_issue_writing: false
          fail_action: true
          # zap-baseline.py exit policy:
          #   * Default: any unsuppressed alert (WARN action) fails.
          #   * Per-rule overrides live in .zap/rules.tsv (IGNORE for
          #     known-noisy/local-only rules, FAIL to escalate).
          #   * -I would suppress WARN failures entirely; we do NOT pass
          #     it because that would only fail on rules explicitly
          #     marked FAIL, which requires enumerating every rule.
          # Other flags:
          #   -j         : also run the AJAX spider so client-rendered
          #                routes are reachable.
          #   -m 5 -T 10 : 5 minute spider, 10 minute total timeout.
          #   -z ...     : ZAP `replacer` add-on injects the iron-session
          #                cookie on every outgoing request so
          #                authenticated pages are scanned.
          cmd_options: >-
            -j
            -m 5
            -T 10
            -z "-config replacer.full_list(0).description=session-cookie
                -config replacer.full_list(0).enabled=true
                -config replacer.full_list(0).matchtype=REQ_HEADER
                -config replacer.full_list(0).matchstr=Cookie
                -config replacer.full_list(0).regex=false
                -config replacer.full_list(0).replacement=${{ steps.session.outputs.cookie }}"

      - name: Install Nuclei
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538 # v3.1.1
        with:
          version: ${{ env.NUCLEI_VERSION }}
          install-only: true

      - name: Prepare Nuclei scan target
        run: |
          set -euo pipefail
          case "${APP_BASE_URL}" in
            http://localhost:3001)
              ;;
            *)
              echo "::error::Refusing to run Nuclei against target: ${APP_BASE_URL}"
              exit 1
              ;;
          esac
          mkdir -p \
            test-results/nuclei/markdown-auth \
            test-results/nuclei/markdown-unauth
          printf '%s\n' "${APP_BASE_URL}" > test-results/nuclei/targets.txt

      - name: Install Nuclei community templates
        id: nuclei_templates
        run: |
          set -euo pipefail
          nuclei -update-templates -ni \
            > test-results/nuclei/templates-update.stdout.log \
            2> test-results/nuclei/templates-update.stderr.log

          if [ ! -d "${HOME}/nuclei-templates" ]; then
            echo "::error::Nuclei community templates were not installed."
            exit 1
          fi

      - name: Run Nuclei unauthenticated boundary scan
        id: nuclei_unauth
        continue-on-error: true
        run: |
          set -euo pipefail
          nuclei \
            -u "${APP_BASE_URL}" \
            -t .github/nuclei/templates/unauth \
            -severity medium,high,critical \
            -jsonl \
            -o test-results/nuclei/unauth.jsonl \
            -sarif-export test-results/nuclei/unauth.sarif \
            -markdown-export test-results/nuclei/markdown-unauth \
            -rate-limit 50 \
            -retries 1 \
            -timeout 5 \
            -duc \
            -ni \
            -omit-raw \
            -redact Cookie \
            -redact Authorization \
            > test-results/nuclei/unauth.stdout.log \
            2> test-results/nuclei/unauth.stderr.log

      - name: Run Nuclei authenticated template scan
        id: nuclei_auth
        continue-on-error: true
        env:
          SESSION_COOKIE: ${{ steps.session.outputs.cookie }}
        run: |
          set -euo pipefail
          echo "::add-mask::${SESSION_COOKIE}"
          nuclei \
            -u "${APP_BASE_URL}" \
            -t "${HOME}/nuclei-templates" \
            -tags exposure,exposures,misconfig,misconfiguration,exposed-panels,tech,technology,cve,cves \
            -exclude-tags intrusive,fuzzing,bruteforce,brute-force,dos,oast,interactsh,default-login,file-upload,destructive,headless \
            -severity medium,high,critical \
            -H "Cookie: ${SESSION_COOKIE}" \
            -jsonl \
            -o test-results/nuclei/auth.jsonl \
            -sarif-export test-results/nuclei/auth.sarif \
            -markdown-export test-results/nuclei/markdown-auth \
            -rate-limit 50 \
            -retries 1 \
            -timeout 5 \
            -duc \
            -ni \
            -omit-raw \
            -redact Cookie \
            -redact Authorization \
            > test-results/nuclei/auth.stdout.log \
            2> test-results/nuclei/auth.stderr.log

      - name: Print DAST scan summary
        if: always()
        env:
          ZAP_SCAN_OUTCOME: ${{ steps.zap_scan.outcome }}
          NUCLEI_TEMPLATES_OUTCOME: ${{ steps.nuclei_templates.outcome }}
          NUCLEI_UNAUTH_OUTCOME: ${{ steps.nuclei_unauth.outcome }}
          NUCLEI_AUTH_OUTCOME: ${{ steps.nuclei_auth.outcome }}
        run: |
          set -euo pipefail
          summary_file="${GITHUB_STEP_SUMMARY:-/dev/null}"

          {
            echo "## DAST execution"
            echo
            echo "- ZAP baseline: ${ZAP_SCAN_OUTCOME}"
            echo "- Community templates: ${NUCLEI_TEMPLATES_OUTCOME}"
            echo "- Unauthenticated scan: ${NUCLEI_UNAUTH_OUTCOME}"
            echo "- Authenticated scan: ${NUCLEI_AUTH_OUTCOME}"
            echo
          } | tee -a "${summary_file}"

          print_log_tail() {
            label="$1"
            file="$2"

            if [ ! -s "${file}" ]; then
              echo "${label}: no output"
              return
            fi

            echo "::group::${label} (last 200 lines)"
            tail -n 200 "${file}"
            echo "::endgroup::"
          }

          print_log_tail "Nuclei template update stderr" \
            test-results/nuclei/templates-update.stderr.log
          print_log_tail "Nuclei template update stdout" \
            test-results/nuclei/templates-update.stdout.log
          print_log_tail "Nuclei unauthenticated stderr" \
            test-results/nuclei/unauth.stderr.log
          print_log_tail "Nuclei unauthenticated stdout" \
            test-results/nuclei/unauth.stdout.log
          print_log_tail "Nuclei authenticated stderr" \
            test-results/nuclei/auth.stderr.log
          print_log_tail "Nuclei authenticated stdout" \
            test-results/nuclei/auth.stdout.log

          node <<'NODE'
          const fs = require('fs');
          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const scanFiles = [
            ['Unauthenticated', 'test-results/nuclei/unauth.jsonl'],
            ['Authenticated', 'test-results/nuclei/auth.jsonl'],
          ];
          const rows = [];
          const findings = [];

          for (const [scan, file] of scanFiles) {
            const counts = { medium: 0, high: 0, critical: 0 };
            if (!fs.existsSync(file)) {
              rows.push({ scan, file, ...counts, exists: false });
              continue;
            }

            const lines = fs.readFileSync(file, 'utf8')
              .split(/\r?\n/)
              .filter(Boolean);

            for (const line of lines) {
              let entry;
              try {
                entry = JSON.parse(line);
              } catch {
                continue;
              }

              const severity = String(
                entry?.info?.severity ?? entry?.severity ?? '',
              ).toLowerCase();
              if (Object.prototype.hasOwnProperty.call(counts, severity)) {
                counts[severity] += 1;
              }

              findings.push({
                scan,
                severity: severity || 'unknown',
                templateId:
                  entry?.['template-id'] ??
                  entry?.templateID ??
                  entry?.template ??
                  'unknown-template',
                name: entry?.info?.name ?? 'Unnamed finding',
                matchedAt:
                  entry?.['matched-at'] ??
                  entry?.matched ??
                  entry?.host ??
                  entry?.url ??
                  '',
              });
            }

            rows.push({ scan, file, ...counts, exists: true });
          }

          console.log('Nuclei finding counts:');
          for (const row of rows) {
            const status = row.exists ? row.file : `${row.file} missing`;
            console.log(
              `- ${row.scan}: medium=${row.medium}, high=${row.high}, critical=${row.critical} (${status})`,
            );
          }

          if (findings.length === 0) {
            console.log('No Nuclei findings were written.');
          } else {
            console.log('Nuclei findings:');
            for (const finding of findings.slice(0, 50)) {
              const target = finding.matchedAt ? ` @ ${finding.matchedAt}` : '';
              console.log(
                `- [${finding.scan}] ${finding.severity} ${finding.templateId}: ${finding.name}${target}`,
              );
            }
            if (findings.length > 50) {
              console.log(`... ${findings.length - 50} additional findings omitted from log.`);
            }
          }

          if (summaryFile) {
            const summary = [
              '## Nuclei findings',
              '',
              '| Scan | Medium | High | Critical | Result file |',
              '| --- | ---: | ---: | ---: | --- |',
              ...rows.map((row) =>
                `| ${row.scan} | ${row.medium} | ${row.high} | ${row.critical} | ${row.exists ? row.file : 'missing'} |`,
              ),
              '',
            ];

            if (findings.length > 0) {
              summary.push('### Findings', '');
              for (const finding of findings.slice(0, 20)) {
                const target = finding.matchedAt
                  ? ` (${finding.matchedAt})`
                  : '';
                summary.push(
                  `- **${finding.scan}** ${finding.severity} ${finding.templateId}: ${finding.name}${target}`,
                );
              }
              if (findings.length > 20) {
                summary.push(`- ... ${findings.length - 20} more in artifacts`);
              }
              summary.push('');
            } else {
              summary.push('No Nuclei findings were written.', '');
            }

            fs.appendFileSync(summaryFile, summary.join('\n'));
          }
          NODE

      - name: Upload Nuclei artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nuclei_scan
          path: test-results/nuclei/**
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Nuclei unauthenticated SARIF
        if: >-
          ${{
            always() &&
            hashFiles('test-results/nuclei/unauth.sarif') != '' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: test-results/nuclei/unauth.sarif
          category: nuclei-unauthenticated

      - name: Upload Nuclei authenticated SARIF
        if: >-
          ${{
            always() &&
            hashFiles('test-results/nuclei/auth.sarif') != '' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: test-results/nuclei/auth.sarif
          category: nuclei-authenticated

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dast-app-log
          path: test-results/app.log
          retention-days: 14
          if-no-files-found: warn

      - name: Evaluate DAST scan outcomes
        if: always()
        run: |
          set -euo pipefail
          failed=0

          if [ "${{ steps.zap_scan.outcome }}" = "failure" ]; then
            echo "::error::OWASP ZAP baseline reported unsuppressed alerts."
            failed=1
          fi

          if [ "${{ steps.nuclei_templates.outcome }}" = "failure" ]; then
            echo "::error::Nuclei community template installation failed."
            failed=1
          fi

          if [ "${{ steps.nuclei_unauth.outcome }}" = "failure" ]; then
            echo "::error::Nuclei unauthenticated scan failed to execute."
            failed=1
          fi

          if [ "${{ steps.nuclei_auth.outcome }}" = "failure" ]; then
            echo "::error::Nuclei authenticated scan failed to execute."
            failed=1
          fi

          if ! node <<'NODE'
          const fs = require('fs');
          const files = [
            'test-results/nuclei/unauth.jsonl',
            'test-results/nuclei/auth.jsonl',
          ];
          const counts = { medium: 0, high: 0, critical: 0 };

          for (const file of files) {
            if (!fs.existsSync(file)) {
              continue;
            }

            const lines = fs.readFileSync(file, 'utf8')
              .split(/\r?\n/)
              .filter(Boolean);

            for (const line of lines) {
              let entry;
              try {
                entry = JSON.parse(line);
              } catch {
                continue;
              }

              const severity = String(
                entry?.info?.severity ?? entry?.severity ?? '',
              ).toLowerCase();
              if (Object.prototype.hasOwnProperty.call(counts, severity)) {
                counts[severity] += 1;
              }
            }
          }

          console.log(
            `Nuclei findings: medium=${counts.medium}, high=${counts.high}, critical=${counts.critical}`,
          );

          if (counts.high > 0 || counts.critical > 0) {
            console.error('Nuclei high or critical findings are present.');
            process.exit(1);
          }
          NODE
          then
            failed=1
          fi

          exit "${failed}"

      - name: Stop prodlike app
        if: always()
        run: bash scripts/security/prodlike-app.sh stop test-results

      - name: Stop IdP service
        if: always()
        run: npm run idp:down || true

      - name: Stop database service
        if: always()
        run: npm run db:down || true
