name: Quality Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Guard privacy display-name enforcement test
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const protectedFiles = [
              'tests/unit/privacy-display-name-enforcement.test.ts'
            ];
            const overrideLabel = 'privacy-guardrail-approved';
            const labels = (context.payload.pull_request.labels ?? [])
              .map(label => label.name);
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              }
            );
            const touchedProtectedFiles = files
              .map(file => file.filename)
              .filter(filename => protectedFiles.includes(filename));

            if (touchedProtectedFiles.length === 0) {
              core.info('No privacy display-name guardrail files changed.');
              return;
            }

            if (labels.includes(overrideLabel)) {
              core.warning(
                `Privacy display-name guardrail file changed, but '${overrideLabel}' is present.`
              );
              return;
            }

            core.setFailed(
              [
                'Privacy display-name guardrail test changed:',
                ...touchedProtectedFiles.map(filename => `- ${filename}`),
                '',
                'This test protects the rule that user-facing actor names must use @/lib/privacy/display-name instead of rendering raw no-user or actor fields.',
                'Fix app/report rendering code instead of weakening this test.',
                `If the guardrail change is intentional and privacy-reviewed, add the '${overrideLabel}' label to the PR and rerun this workflow.`
              ].join('\n')
            );

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run formatting check
        run: npm run format:check

      - name: Run spell check
        run: npm run spell:check

      - name: Run lint check
        run: npm run lint

      - name: Run markdown lint check
        run: npm run lint:md

      - name: Run type check
        run: npm run type-check

      - name: Run Python type check
        run: npm run lint:py

      # Must use the action to get the executable as it is not installed, and have
      # not a secure download URL to fetch it from.
      - name: Run dotenv-linter root check
        uses: dotenv-linter/action-dotenv-linter@v3
        with:
          dotenv_linter_flags: .
          filter_mode: nofilter
          fail_level: any

      # Must use the action to get the executable as it is not installed, and have
      # not a secure download URL to fetch it from.
      - name: Run dotenv-linter devcontainer check
        uses: dotenv-linter/action-dotenv-linter@v3
        with:
          dotenv_linter_flags: .devcontainer --recursive
          filter_mode: nofilter
          fail_level: any

      - name: Run tests and coverage
        run: npm run test:coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: ./coverage
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
          token: ${{ vars.CODECOV_TOKEN }}
