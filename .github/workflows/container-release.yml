name: Container Release

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - '!v*-*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  trusted-release:
    name: Publish and Smoke Test Trusted Container Stack
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      NEXT_PUBLIC_SITE_URL: https://kravhantering.test
      PODMAN_COMPOSE_PROVIDER: podman-compose
      STORAGE_DRIVER: vfs

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup .NET for GitVersion
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5

      - name: Install dependencies
        run: npm ci

      - name: Restore GitVersion tool
        run: dotnet tool restore

      - name: Compute GitVersion
        run: |
          set -euo pipefail
          mkdir -p tmp/container-release-artifacts/metadata
          dotnet tool run dotnet-gitversion /output json \
            > tmp/container-release-artifacts/metadata/gitversion.json

      - name: Compute trusted release plan
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          node scripts/release/container-release.mjs plan \
            --gitversion-json tmp/container-release-artifacts/metadata/gitversion.json \
            --output tmp/container-release-artifacts/metadata/release-plan.json \
            --github-env "${GITHUB_ENV}"

      - name: Sync merged PR operator upgrade notes
        if: env.RELEASE_CREATE_GITHUB_RELEASE == 'true' && env.RELEASE_PRERELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/release/operator-upgrade-notes.mjs sync-commit-prs \
            --commit "${GITHUB_SHA}"

      - name: Write host build metadata artifact
        run: node scripts/prebuild.js

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install container runtime tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y podman podman-compose libnss3-tools
          sudo sysctl net.ipv4.ip_unprivileged_port_start=0
          echo "127.0.0.1 kravhantering.test" | sudo tee -a /etc/hosts
          podman --version
          podman compose version
          podman info
          docker --version
          docker buildx version
          docker info
          docker buildx ls

      - name: Prepare Docker Buildx builder
        run: |
          set -euo pipefail
          docker buildx create --name kravhantering-release-builder --use ||
            docker buildx use kravhantering-release-builder
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and publish app-runtime image
        run: |
          set -euo pipefail
          mkdir -p tmp/container-release-artifacts/metadata
          IFS=',' read -ra tags <<< "${APP_RUNTIME_TAGS_CSV}"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "${tag}")
          done
          docker buildx build \
            --file containers/app/Dockerfile \
            --target app-runtime \
            --platform linux/amd64 \
            --metadata-file tmp/container-release-artifacts/metadata/app-runtime-buildx.json \
            --build-arg BUILD_VERSION="${RELEASE_VERSION}" \
            --build-arg BUILD_COMMIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILD_EXPECTED_DATABASE_SCHEMA_VERSION="${BUILD_EXPECTED_DATABASE_SCHEMA_VERSION}" \
            --build-arg BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
            --build-arg BUILD_IMAGE_TAG="${APP_RUNTIME_PRIMARY_TAG}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=${APP_RUNTIME_DESCRIPTION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotation "manifest:org.opencontainers.image.description=${APP_RUNTIME_DESCRIPTION}" \
            --provenance=false \
            "${tag_args[@]}" \
            --push \
            .

      - name: Build and publish db-job image
        run: |
          set -euo pipefail
          IFS=',' read -ra tags <<< "${DB_JOB_TAGS_CSV}"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "${tag}")
          done
          docker buildx build \
            --file containers/app/Dockerfile \
            --target db-job \
            --platform linux/amd64 \
            --metadata-file tmp/container-release-artifacts/metadata/db-job-buildx.json \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=${DB_JOB_DESCRIPTION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotation "manifest:org.opencontainers.image.description=${DB_JOB_DESCRIPTION}" \
            --provenance=false \
            "${tag_args[@]}" \
            --push \
            .

      - name: Build and publish demo seed image
        run: |
          set -euo pipefail
          IFS=',' read -ra tags <<< "${DEMO_SEED_TAGS_CSV}"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "${tag}")
          done
          docker buildx build \
            --file containers/app/Dockerfile \
            --target demo-seed \
            --platform linux/amd64 \
            --metadata-file tmp/container-release-artifacts/metadata/demo-seed-buildx.json \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=${DEMO_SEED_DESCRIPTION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotation "manifest:org.opencontainers.image.description=${DEMO_SEED_DESCRIPTION}" \
            --provenance=false \
            "${tag_args[@]}" \
            --push \
            .

      - name: Build and publish HSA directory mock image
        run: |
          set -euo pipefail
          IFS=',' read -ra tags <<< "${HSA_DIRECTORY_MOCK_TAGS_CSV}"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "${tag}")
          done
          docker buildx build \
            --file containers/hsa-directory-mock/Dockerfile \
            --platform linux/amd64 \
            --metadata-file tmp/container-release-artifacts/metadata/hsa-directory-mock-buildx.json \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=${HSA_DIRECTORY_MOCK_DESCRIPTION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotation "manifest:org.opencontainers.image.description=${HSA_DIRECTORY_MOCK_DESCRIPTION}" \
            --provenance=false \
            "${tag_args[@]}" \
            --push \
            containers/hsa-directory-mock

      - name: Build and publish HSA person lookup adapter image
        run: |
          set -euo pipefail
          IFS=',' read -ra tags <<< "${HSA_PERSON_LOOKUP_ADAPTER_TAGS_CSV}"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "${tag}")
          done
          docker buildx build \
            --file containers/hsa-person-lookup-adapter/Dockerfile \
            --platform linux/amd64 \
            --metadata-file tmp/container-release-artifacts/metadata/hsa-person-lookup-adapter-buildx.json \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.description=${HSA_PERSON_LOOKUP_ADAPTER_DESCRIPTION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotation "manifest:org.opencontainers.image.description=${HSA_PERSON_LOOKUP_ADAPTER_DESCRIPTION}" \
            --provenance=false \
            "${tag_args[@]}" \
            --push \
            containers/hsa-person-lookup-adapter

      - name: Record published image identities
        run: |
          node scripts/release/container-release.mjs identities \
            --plan tmp/container-release-artifacts/metadata/release-plan.json \
            --app-metadata tmp/container-release-artifacts/metadata/app-runtime-buildx.json \
            --db-job-metadata tmp/container-release-artifacts/metadata/db-job-buildx.json \
            --demo-seed-metadata tmp/container-release-artifacts/metadata/demo-seed-buildx.json \
            --hsa-directory-mock-metadata tmp/container-release-artifacts/metadata/hsa-directory-mock-buildx.json \
            --hsa-person-lookup-adapter-metadata tmp/container-release-artifacts/metadata/hsa-person-lookup-adapter-buildx.json \
            --output tmp/container-release-artifacts/metadata/release-metadata.json \
            --github-env "${GITHUB_ENV}"

      - name: Generate release stack lock
        run: |
          node scripts/containers/generate-stack-lock.mjs generate \
            --release-version "${RELEASE_VERSION}" \
            --commit-sha "${GITHUB_SHA}" \
            --app-image "${APP_RUNTIME_IMAGE}" \
            --app-tag "${APP_RUNTIME_PRIMARY_TAG_NAME}" \
            --app-manifest-digest "${APP_RUNTIME_MANIFEST_DIGEST}" \
            --app-image-id "${APP_RUNTIME_IMAGE_ID}" \
            --app-source ghcr-release \
            --db-job-image "${DB_JOB_IMAGE}" \
            --db-job-tag "${DB_JOB_PRIMARY_TAG_NAME}" \
            --db-job-manifest-digest "${DB_JOB_MANIFEST_DIGEST}" \
            --db-job-image-id "${DB_JOB_IMAGE_ID}" \
            --db-job-source ghcr-release
          node scripts/containers/generate-stack-lock.mjs check

      - name: Generate release HSA integration support lock
        run: |
          node scripts/containers/generate-hsa-integration-support-lock.mjs generate \
            --release-version "${RELEASE_VERSION}" \
            --commit-sha "${GITHUB_SHA}" \
            --hsa-person-lookup-adapter-image "${HSA_PERSON_LOOKUP_ADAPTER_IMAGE}" \
            --hsa-person-lookup-adapter-tag "${HSA_PERSON_LOOKUP_ADAPTER_PRIMARY_TAG_NAME}" \
            --hsa-person-lookup-adapter-manifest-digest "${HSA_PERSON_LOOKUP_ADAPTER_MANIFEST_DIGEST}" \
            --hsa-person-lookup-adapter-image-id "${HSA_PERSON_LOOKUP_ADAPTER_IMAGE_ID}" \
            --hsa-person-lookup-adapter-source ghcr-release
          node scripts/containers/generate-hsa-integration-support-lock.mjs check

      - name: Generate release test support lock
        run: |
          node scripts/containers/generate-test-support-lock.mjs generate \
            --release-version "${RELEASE_VERSION}" \
            --commit-sha "${GITHUB_SHA}" \
            --hsa-directory-mock-image "${HSA_DIRECTORY_MOCK_IMAGE}" \
            --hsa-directory-mock-tag "${HSA_DIRECTORY_MOCK_PRIMARY_TAG_NAME}" \
            --hsa-directory-mock-manifest-digest "${HSA_DIRECTORY_MOCK_MANIFEST_DIGEST}" \
            --hsa-directory-mock-image-id "${HSA_DIRECTORY_MOCK_IMAGE_ID}" \
            --hsa-directory-mock-source ghcr-release
          node scripts/containers/generate-test-support-lock.mjs check

      - name: Prepare SBOM artifact directory
        run: mkdir -p tmp/container-release-artifacts/sbom

      - name: Generate app-runtime SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.APP_RUNTIME_MANIFEST_DIGEST_REF }}
          format: spdx-json
          output-file: tmp/container-release-artifacts/sbom/app-runtime.spdx.json
          upload-artifact: false

      - name: Generate db-job SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.DB_JOB_MANIFEST_DIGEST_REF }}
          format: spdx-json
          output-file: tmp/container-release-artifacts/sbom/db-job.spdx.json
          upload-artifact: false

      - name: Generate demo seed SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.DEMO_SEED_MANIFEST_DIGEST_REF }}
          format: spdx-json
          output-file: tmp/container-release-artifacts/sbom/demo-seed.spdx.json
          upload-artifact: false

      - name: Generate HSA directory mock SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.HSA_DIRECTORY_MOCK_MANIFEST_DIGEST_REF }}
          format: spdx-json
          output-file: tmp/container-release-artifacts/sbom/hsa-directory-mock.spdx.json
          upload-artifact: false

      - name: Generate HSA person lookup adapter SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.HSA_PERSON_LOOKUP_ADAPTER_MANIFEST_DIGEST_REF }}
          format: spdx-json
          output-file: tmp/container-release-artifacts/sbom/hsa-person-lookup-adapter.spdx.json
          upload-artifact: false

      - name: Attest app-runtime provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.APP_RUNTIME_IMAGE }}
          subject-digest: ${{ env.APP_RUNTIME_MANIFEST_DIGEST }}
          push-to-registry: false

      - name: Attest db-job provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.DB_JOB_IMAGE }}
          subject-digest: ${{ env.DB_JOB_MANIFEST_DIGEST }}
          push-to-registry: false

      - name: Attest demo seed provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.DEMO_SEED_IMAGE }}
          subject-digest: ${{ env.DEMO_SEED_MANIFEST_DIGEST }}
          push-to-registry: false

      - name: Attest HSA directory mock provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.HSA_DIRECTORY_MOCK_IMAGE }}
          subject-digest: ${{ env.HSA_DIRECTORY_MOCK_MANIFEST_DIGEST }}
          push-to-registry: false

      - name: Attest HSA person lookup adapter provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.HSA_PERSON_LOOKUP_ADAPTER_IMAGE }}
          subject-digest: ${{ env.HSA_PERSON_LOOKUP_ADAPTER_MANIFEST_DIGEST }}
          push-to-registry: false

      - name: Attest app-runtime SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.APP_RUNTIME_IMAGE }}
          subject-digest: ${{ env.APP_RUNTIME_MANIFEST_DIGEST }}
          sbom-path: tmp/container-release-artifacts/sbom/app-runtime.spdx.json
          push-to-registry: false

      - name: Attest db-job SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.DB_JOB_IMAGE }}
          subject-digest: ${{ env.DB_JOB_MANIFEST_DIGEST }}
          sbom-path: tmp/container-release-artifacts/sbom/db-job.spdx.json
          push-to-registry: false

      - name: Attest demo seed SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.DEMO_SEED_IMAGE }}
          subject-digest: ${{ env.DEMO_SEED_MANIFEST_DIGEST }}
          sbom-path: tmp/container-release-artifacts/sbom/demo-seed.spdx.json
          push-to-registry: false

      - name: Attest HSA directory mock SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.HSA_DIRECTORY_MOCK_IMAGE }}
          subject-digest: ${{ env.HSA_DIRECTORY_MOCK_MANIFEST_DIGEST }}
          sbom-path: tmp/container-release-artifacts/sbom/hsa-directory-mock.spdx.json
          push-to-registry: false

      - name: Attest HSA person lookup adapter SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.HSA_PERSON_LOOKUP_ADAPTER_IMAGE }}
          subject-digest: ${{ env.HSA_PERSON_LOOKUP_ADAPTER_MANIFEST_DIGEST }}
          sbom-path: tmp/container-release-artifacts/sbom/hsa-person-lookup-adapter.spdx.json
          push-to-registry: false

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for ref in "${APP_RUNTIME_MANIFEST_DIGEST_REF}" "${DB_JOB_MANIFEST_DIGEST_REF}" "${DEMO_SEED_MANIFEST_DIGEST_REF}" "${HSA_DIRECTORY_MOCK_MANIFEST_DIGEST_REF}" "${HSA_PERSON_LOOKUP_ADAPTER_MANIFEST_DIGEST_REF}"; do
            gh attestation verify "oci://${ref}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/container-release.yml"
            gh attestation verify "oci://${ref}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/container-release.yml" \
              --predicate-type https://spdx.dev/Document/v2.3
          done

      - name: Create per-container local env files
        run: npm run container:env:local

      - name: Start release stack from verified GHCR manifest digests
        run: |
          node scripts/containers/run-local-stack.mjs up \
            --mode release-smoke \
            --run-id "${CONTAINER_STACK_RUN_ID}" \
            --hsa-integration-lock-file container-hsa-integration-support.lock.json \
            --test-lock-file container-test-support.lock.json \
            --release-images-from-lock

      - name: Trust generated CA for browser runner
        run: bash .devcontainer/trust-container-ca.sh

      - name: Run release smoke tests
        run: npm run test:release-smoke
        env:
          CI: true

      - name: Collect status before shutdown on failure
        if: failure()
        run: |
          node scripts/containers/collect-status.mjs \
            --project-name "${CONTAINER_PROJECT_NAME}" \
            --output-text container-status-before-down.txt \
            --output-json container-status-before-down.json \
            --tail 160 || true

      - name: Stop container stack
        if: always()
        run: |
          node scripts/containers/run-local-stack.mjs down \
            --mode release-smoke \
            --run-id "${CONTAINER_STACK_RUN_ID}" || true

      - name: Collect status after shutdown on failure
        if: failure()
        run: |
          node scripts/containers/collect-status.mjs \
            --project-name "${CONTAINER_PROJECT_NAME}" \
            --output-text container-status-after-down.txt \
            --output-json container-status-after-down.json \
            --tail 160 || true

      - name: Write artifact hashes
        if: always()
        run: |
          node scripts/containers/write-hashes.mjs \
            --output hashes.sha256 \
            container-stack.lock.json \
            container-hsa-integration-support.lock.json \
            container-test-support.lock.json \
            container-stack.compose.yml \
            container-status.txt \
            container-status.json \
            container-status-before-down.txt \
            container-status-before-down.json \
            container-status-after-down.txt \
            container-status-after-down.json \
            public/build.json \
            tmp/container-release-artifacts/metadata/gitversion.json \
            tmp/container-release-artifacts/metadata/release-plan.json \
            tmp/container-release-artifacts/metadata/release-metadata.json \
            tmp/container-release-artifacts/sbom/app-runtime.spdx.json \
            tmp/container-release-artifacts/sbom/db-job.spdx.json \
            tmp/container-release-artifacts/sbom/demo-seed.spdx.json \
            tmp/container-release-artifacts/sbom/hsa-person-lookup-adapter.spdx.json \
            tmp/container-release-artifacts/sbom/hsa-directory-mock.spdx.json || true

      - name: Stage production deployment bundle
        if: always()
        run: |
          node scripts/release/container-release.mjs bundle \
            --plan tmp/container-release-artifacts/metadata/release-plan.json \
            --metadata tmp/container-release-artifacts/metadata/release-metadata.json \
            --stack-lock container-stack.lock.json \
            --hsa-integration-support-lock container-hsa-integration-support.lock.json \
            --test-support-lock container-test-support.lock.json \
            --build-json public/build.json \
            --hashes hashes.sha256 \
            --sbom-dir tmp/container-release-artifacts/sbom \
            --output-dir tmp/container-release-artifacts/deployment

      - name: Archive production deployment bundle
        if: always()
        run: |
          set -euo pipefail
          bundle="kravhantering-production-deploy-${RELEASE_VERSION}"
          artifact_dir="tmp/container-release-artifacts"
          archive="${artifact_dir}/${bundle}.tar.gz"
          tar -C tmp/container-release-artifacts/deployment \
            -czf "${archive}" \
            "${bundle}"
          ( cd "${artifact_dir}" && sha256sum "${bundle}.tar.gz" ) |
            tee "${archive}.sha256"
          cat "${archive}.sha256" >> hashes.sha256

      - name: Write release notes
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/release/container-release.mjs notes \
            --plan tmp/container-release-artifacts/metadata/release-plan.json \
            --metadata tmp/container-release-artifacts/metadata/release-metadata.json \
            --hashes hashes.sha256 \
            --output tmp/container-release-artifacts/release-notes.md

      - name: Stage release artifacts
        if: always()
        run: |
          set -euo pipefail
          mkdir -p \
            tmp/container-release-artifacts/runtime \
            tmp/container-release-artifacts/playwright

          for file in \
            container-stack.lock.json \
            container-hsa-integration-support.lock.json \
            container-test-support.lock.json \
            container-stack.compose.yml \
            container-status.txt \
            container-status.json \
            container-status-before-down.txt \
            container-status-before-down.json \
            container-status-after-down.txt \
            container-status-after-down.json \
            public/build.json \
            hashes.sha256; do
            if [ -f "${file}" ]; then
              cp "${file}" tmp/container-release-artifacts/runtime/
            fi
          done

          if [ -d playwright-report-release-smoke ]; then
            cp -R \
              playwright-report-release-smoke \
              tmp/container-release-artifacts/playwright/html
          fi
          if [ -d test-results/release-smoke ]; then
            cp -R \
              test-results/release-smoke \
              tmp/container-release-artifacts/playwright/test-results
          fi

      - name: Create preview tag when needed
        if: env.RELEASE_CREATE_GITHUB_RELEASE == 'true' && env.RELEASE_PRERELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          node scripts/release/container-release.mjs ensure-tag \
            --plan tmp/container-release-artifacts/metadata/release-plan.json

      - name: Publish GitHub Release
        if: env.RELEASE_CREATE_GITHUB_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_flags=()
          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            release_flags+=(--prerelease --latest=false)
          else
            release_flags+=(--latest=true)
          fi

          if gh release view "${RELEASE_TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG_NAME}" \
              --title "${RELEASE_TAG_NAME}" \
              --notes-file tmp/container-release-artifacts/release-notes.md \
              "${release_flags[@]}"
          else
            gh release create "${RELEASE_TAG_NAME}" \
              --title "${RELEASE_TAG_NAME}" \
              --notes-file tmp/container-release-artifacts/release-notes.md \
              "${release_flags[@]}"
          fi

          gh release upload "${RELEASE_TAG_NAME}" \
            container-stack.lock.json \
            container-hsa-integration-support.lock.json \
            container-test-support.lock.json \
            container-stack.compose.yml \
            hashes.sha256 \
            public/build.json \
            tmp/container-release-artifacts/metadata/release-metadata.json \
            tmp/container-release-artifacts/sbom/app-runtime.spdx.json \
            tmp/container-release-artifacts/sbom/db-job.spdx.json \
            tmp/container-release-artifacts/sbom/demo-seed.spdx.json \
            tmp/container-release-artifacts/sbom/hsa-person-lookup-adapter.spdx.json \
            tmp/container-release-artifacts/sbom/hsa-directory-mock.spdx.json \
            tmp/container-release-artifacts/kravhantering-production-deploy-${RELEASE_VERSION}.tar.gz \
            tmp/container-release-artifacts/kravhantering-production-deploy-${RELEASE_VERSION}.tar.gz.sha256 \
            --clobber

      - name: Archive stable operator upgrade notes
        if: env.RELEASE_CREATE_GITHUB_RELEASE == 'true' && env.RELEASE_IS_STABLE == 'true'
        env:
          GH_TOKEN: ${{ secrets.OPERATOR_UPGRADE_NOTES_TOKEN }}
        run: |
          set -euo pipefail
          archive_branch="automation/operator-upgrade-notes-archive-${RELEASE_TAG_NAME}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::OPERATOR_UPGRADE_NOTES_TOKEN is required."
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git switch --force-create "${archive_branch}" origin/main

          gh api "repos/${GITHUB_REPOSITORY}" --jq '.full_name' >/dev/null
          release_date="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG_NAME}" --jq '.published_at[0:10]')"
          if [ -z "${release_date}" ]; then
            echo "::error::Unable to read the publication date for ${RELEASE_TAG_NAME}."
            exit 1
          fi

          node scripts/release/operator-upgrade-notes.mjs archive-stable \
            --version "${RELEASE_TAG_NAME}" \
            --date "${release_date}"

          if git diff --quiet -- "docs/operations/operator-upgrade-notes.md"; then
            echo "No stable operator upgrade notes archive changes to commit."
            exit 0
          fi

          git config user.name "Viscalyxbot"
          git config user.email "viscalyxbot@viscalyx.se"
          git add "docs/operations/operator-upgrade-notes.md"
          git commit -m "docs: archive operator upgrade notes for ${RELEASE_TAG_NAME}"

          remote_branch_exists=false
          if git ls-remote --exit-code --heads origin "${archive_branch}" >/dev/null; then
            git fetch origin "+${archive_branch}:refs/remotes/origin/${archive_branch}"
            remote_branch_exists=true
          fi
          if [ "${remote_branch_exists}" = "true" ]; then
            git push --force-with-lease origin HEAD:"refs/heads/${archive_branch}"
          else
            git push origin HEAD:"refs/heads/${archive_branch}"
          fi

          title="docs: archive operator upgrade notes for ${RELEASE_TAG_NAME}"
          body_file="$(mktemp)"
          {
            echo "This automated PR archives the stable Operator Upgrade Notes for ${RELEASE_TAG_NAME}."
            echo
            echo "- Release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG_NAME}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Merge after the required checks pass."
            echo
            echo "## Operator Upgrade Impact"
            echo
            echo "- [x] No operator notes needed. <!-- DO NOT REMOVE: operator-upgrade:no-notes -->"
            echo
            echo "## SSDLC (Secure Software Development Life Cycle) Gate"
            echo
            echo "- [x] I have reviewed SSDLC requirements for this change and addressed any security, data protection, threat-model, and security-testing impacts. <!-- DO NOT REMOVE: ssdlc:requirements -->"
          } > "${body_file}"

          pr_number="$(gh pr list --base main --head "${archive_branch}" --state open --json number --jq '.[0].number // empty')"
          if [ -z "${pr_number}" ]; then
            gh pr create --base main --head "${archive_branch}" --title "${title}" --body-file "${body_file}"
            pr_number="$(gh pr list --base main --head "${archive_branch}" --state open --json number --jq '.[0].number // empty')"
          else
            gh pr edit "${pr_number}" --title "${title}" --body-file "${body_file}"
          fi

          if [ -z "${pr_number}" ]; then
            echo "::error::Unable to find or create the operator upgrade notes archive pull request."
            exit 1
          fi

          if gh pr merge "${pr_number}" --squash --auto --delete-branch; then
            echo "Enabled auto-merge for operator upgrade notes archive PR #${pr_number}."
          else
            echo "::warning::Opened operator upgrade notes archive PR #${pr_number}, but auto-merge could not be enabled. Merge it after required checks pass."
          fi

      - name: Upload release runtime artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-release-runtime-${{ github.run_id }}
          path: tmp/container-release-artifacts/runtime/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload release metadata artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-release-metadata-${{ github.run_id }}
          path: |
            tmp/container-release-artifacts/metadata/
            tmp/container-release-artifacts/sbom/
            tmp/container-release-artifacts/release-notes.md
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release Playwright artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-release-playwright-${{ github.run_id }}
          path: tmp/container-release-artifacts/playwright/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload release deployment bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-release-deployment-${{ github.run_id }}
          path: |
            tmp/container-release-artifacts/kravhantering-production-deploy-*.tar.gz
            tmp/container-release-artifacts/kravhantering-production-deploy-*.tar.gz.sha256
          if-no-files-found: warn
          retention-days: 30
