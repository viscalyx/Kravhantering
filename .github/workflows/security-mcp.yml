name: Security MCP

# Repo-owned MCP seeded HTTP security gate against the localhost prodlike app.
# See docs/security-privacy/mcp-seeded-dast.md for the design and tuning guide.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '39 4 * * 3'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mcp-seeded-scan:
    name: MCP seeded HTTP
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      APP_BASE_URL: http://localhost:3001
      # CI-only service-to-service issuer. Keep the app scan target on localhost,
      # but fetch Keycloak token/JWKS over explicit IPv4 loopback.
      AUTH_OIDC_ISSUER_URL: http://127.0.0.1:8080/realms/kravhantering-dev
      MCP_CLIENT_ID: kravhantering-mcp
      MCP_CLIENT_SECRET: dev-only-mcp-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start prodlike stack
        uses: ./.github/actions/prodlike-stack
        with:
          disable-openrouter: 'true'
          idp-health-url: ${{ env.AUTH_OIDC_ISSUER_URL }}/.well-known/openid-configuration
          idp-jwks-url: ${{ env.AUTH_OIDC_ISSUER_URL }}/protocol/openid-connect/certs
          idp-start-command: npm run idp:reset
          results-dir: test-results/security-mcp

      - name: Guard MCP scan target
        run: |
          set -euo pipefail
          case "${APP_BASE_URL}" in
            http://localhost:3001)
              ;;
            *)
              echo "::error::Refusing to run MCP seeded scan against target: ${APP_BASE_URL}"
              exit 1
              ;;
          esac

      - name: Acquire MCP bearer token
        id: mcp_token
        run: |
          set -euo pipefail
          TOKEN="$(node scripts/security/get-mcp-token.mjs)"
          if [ -z "${TOKEN}" ]; then
            echo "Empty token returned from helper" >&2
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          {
            echo "token<<TOKEN_EOF"
            echo "${TOKEN}"
            echo "TOKEN_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run MCP seeded scan
        id: mcp_scan
        continue-on-error: true
        env:
          MCP_BEARER_TOKEN: ${{ steps.mcp_token.outputs.token }}
          OPENROUTER_API_KEY: ''
          OPENROUTER_MGMT_API_KEY: ''
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          PLAYWRIGHT_SKIP_AUTH_SETUP: '1'
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
        run: |
          set -euo pipefail
          echo "::add-mask::${MCP_BEARER_TOKEN}"
          npm run test:integration:prodlike -- tests/integration/mcp/seeded-scan.spec.ts

      - name: Print MCP seeded scan summary
        if: always()
        run: |
          set -euo pipefail
          if [ -f test-results/mcp-seeded/summary.md ]; then
            echo "MCP seeded scan summary:"
            cat test-results/mcp-seeded/summary.md
            {
              echo "## MCP seeded scan summary"
              echo
              cat test-results/mcp-seeded/summary.md
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No MCP seeded scan summary was written."
          fi

      - name: Upload MCP seeded scan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp_seeded_scan
          path: test-results/mcp-seeded/**
          retention-days: 14
          if-no-files-found: warn

      - name: Upload MCP app log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-mcp-app-log
          path: test-results/security-mcp/app.log
          retention-days: 14
          if-no-files-found: warn

      - name: Evaluate MCP scan outcome
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.mcp_scan.outcome }}" = "failure" ]; then
            echo "::error::MCP seeded scan reported security gate failures."
            exit 1
          fi

      - name: Clean up prodlike stack
        if: always()
        uses: ./.github/actions/prodlike-cleanup
        with:
          results-dir: test-results/security-mcp
