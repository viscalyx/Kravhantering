name: Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production code
        run: npm run build
        env:
          # Treat warnings as errors during build
          CI: true
          # Required by app/layout.tsx and app/sitemap.ts at build-time
          # page-data collection. Use a placeholder for CI builds; real
          # value is provided per-environment at deploy time.
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Check build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed: .next directory not found"
            exit 1
          fi
          echo "✅ Build successful: .next directory created"

      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-logs
          path: |
            .next/
            npm-debug.log*
            yarn-error.log*
          retention-days: 1
