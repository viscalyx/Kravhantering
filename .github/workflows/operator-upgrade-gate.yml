name: Operator Upgrade Gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  operator-upgrade-gate:
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' ||
      !startsWith(github.event.pull_request.title, 'build(deps):')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: '.nvmrc'

      - name: Check operator upgrade evidence
        run: node scripts/release/operator-upgrade-gate.mjs --github-pr "${PR_NUMBER}"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
