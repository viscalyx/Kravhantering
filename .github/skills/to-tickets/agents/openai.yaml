interface:
  display_name: "To Tickets"
  short_description: "Break approved plans into dependency-aware tracer-bullet tickets"
  default_prompt: "Use $to-tickets to break the current plan, spec, or conversation into vertical-slice tickets, show each ticket's blockers and deliverable, ask for approval of the breakdown, and publish the approved tickets to the configured issue tracker or local ticket files."
policy:
  allow_implicit_invocation: false
