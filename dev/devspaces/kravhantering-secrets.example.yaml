apiVersion: v1
kind: Secret
metadata:
  name: kravhantering-secrets
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    controller.devfile.io/watch-secret: 'true'
    controller.devfile.io/mount-to-devworkspace: 'true'
  annotations:
    controller.devfile.io/mount-as: env
type: Opaque
stringData:
  # SQL Server SA password (must satisfy complexity rules)
  MSSQL_SA_PASSWORD: 'YourStrong!Passw0rd'
  # Readonly DB user password used for browsing
  DB_READONLY_PASSWORD: 'BrowseOnly!Passw0rd7'
  # Keycloak admin password
  KEYCLOAK_ADMIN_PASSWORD: 'admin'
  # OIDC client secret
  AUTH_OIDC_CLIENT_SECRET: 'dev-only-app-secret'
  # Iron-session cookie password (>=32 bytes)
  AUTH_SESSION_COOKIE_PASSWORD: 'replace-with-32-bytes-of-randomness-XXXXXXXX'
  # OpenRouter / AI keys (optional)
  OPENROUTER_API_KEY: ''
  OPENROUTER_MGMT_API_KEY: ''
  # GitHub token for any automation the workspace needs (optional)
  GH_TOKEN: ''
