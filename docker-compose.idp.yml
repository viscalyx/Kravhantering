#
# Local OIDC IdP for development. Spins up Keycloak as a spec-compliant
# stand-in for PhenixID. The realm `kravhantering-dev` is imported on every
# start from `dev/keycloak/realm-kravhantering-dev.json`, so the JSON file is
# the source of truth — changes made via the admin UI on http://localhost:8080
# are NOT persisted across container restarts.
#
# Usage:
#   docker compose -f docker-compose.idp.yml up --wait idp
#   docker compose -f docker-compose.idp.yml down
#
# This file is independent of docker-compose.sqlserver.yml; bring up only what
# you need.

name: kravhantering-idp-dev

services:
  idp:
    # https://www.keycloak.org/docs/latest/upgrading/
    image: quay.io/keycloak/keycloak:26.7.0-0
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8080}:8080"
    volumes:
      - ./dev/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -ec '{ printf "GET /realms/kravhantering-dev/.well-known/openid-configuration HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3;
          grep -m 1 " 200 " <&3 >/dev/null; } 3<>/dev/tcp/localhost/8080 &&
          { printf "GET /realms/kravhantering-dev/protocol/openid-connect/certs HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3;
          grep -m 1 " 200 " <&3 >/dev/null; } 3<>/dev/tcp/localhost/8080'
      interval: 5s
      retries: 30
      start_period: 10s
      timeout: 5s
