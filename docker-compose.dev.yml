#
# This docker-compose.dev.yml is used for local development to run a
# lightweight SQLite HTTP proxy service (sqlite_http_server.py) that
# exposes the project's SQLite DB at /var/lib/kravhantering/dev.sqlite.
# It is intended for running the app and local tests on the developer machine.
# This file is separate from devcontainer docker-compose*.yml used by VS Code
# devcontainers; devcontainer compose files may include additional services,
# different volume mounts, and environment tailored to the codespace/devcontainer.
# Use this file for local, host-based development. Use devcontainer files for
# containerized dev environments launched by VS Code Remote - Containers.

name: kravhantering-dev

services:
  db:
    image: python:3.12-slim
    working_dir: /workspace
    command:
      [
        "python3",
        "/workspace/scripts/sqlite_http_server.py",
        "--host",
        "0.0.0.0",
        "--port",
        "9000",
        "--db-file",
        "/var/lib/kravhantering/dev.sqlite"
      ]
    environment:
      PYTHONUNBUFFERED: "1"
      SQLITE_PROXY_QUIET: "1"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz', timeout=2).read()"
        ]
      interval: 2s
      retries: 30
      timeout: 2s
    ports:
      - "9000:9000"
    volumes:
      - .:/workspace:ro
      - sqlite-db-data:/var/lib/kravhantering

volumes:
  sqlite-db-data:
