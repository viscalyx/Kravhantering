openapi: 3.0.3
info:
  title: Kravhantering Requirements REST API
  version: 0.1.0
  description: >
    Static CI contract for the authenticated JSON REST API used by the
    requirements UI. This file is not served by the application at runtime.
servers:
  - url: http://localhost:3001
    description: Local prodlike CI server only.
tags:
  - name: auth
  - name: requirements
  - name: catalogs
  - name: privacy
security:
  - cookieSession: []
paths:
  /api/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentSession
      summary: Return the current session projection.
      security: []
      responses:
        '200':
          description: Current session projection.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnonymousSession'
                  - $ref: '#/components/schemas/AuthenticatedSession'

  /api/privacy/erasure-preview:
    post:
      tags: [privacy]
      operationId: previewPrivacyErasure
      summary: Preview HSA-id based privacy erasure.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyErasurePreviewRequest'
            examples:
              seededTarget:
                value:
                  target: { hsaId: SE5560000001-kalle1 }
              seededTargetWithReplacement:
                value:
                  replacement:
                    displayName: Anna Maria Eriksson
                    email: anna.maria.eriksson@example.test
                    firstName: Anna Maria
                    hsaId: SE5560000001-johlju
                    lastName: Eriksson
                  target: { hsaId: SE5560000001-kalle1 }
      responses:
        '200':
          description: Privacy erasure preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyErasurePreviewResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/privacy/erasure-requests:
    post:
      tags: [privacy]
      operationId: executePrivacyErasure
      summary: Execute HSA-id based privacy erasure from a preview token.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyErasureRequest'
            examples:
              staleGeneratedPreview:
                value:
                  actions:
                    requirement_versions.created_by: anonymize
                  previewToken: generated-preview-token
                  target: { hsaId: SE5560000001-kalle1 }
      responses:
        '201':
          description: Privacy erasure execution result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyErasureResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/privacy/data-subject-export:
    post:
      tags: [privacy]
      operationId: createDataSubjectExport
      summary: Generate a data subject access export.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataSubjectExportRequest'
            examples:
              selfJson:
                value:
                  delivery: json
                  locale: sv
              privacyOfficerPdf:
                value:
                  delivery: pdf
                  locale: en
                  target: { hsaId: SE5560000001-kalle1 }
      responses:
        '200':
          description: Data subject access export.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: [no-store]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSubjectExportResponse'
            application/pdf:
              schema:
                type: string
                format: binary
        '400': { $ref: '#/components/responses/NoStoreBadRequest' }
        '401': { $ref: '#/components/responses/NoStoreUnauthorized' }
        '403': { $ref: '#/components/responses/NoStoreForbidden' }

  /api/requirements:
    get:
      tags: [requirements]
      operationId: listRequirements
      summary: List requirements as JSON.
      parameters:
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
        - name: uniqueIdSearch
          in: query
          schema: { type: string, maxLength: 100 }
        - name: descriptionSearch
          in: query
          schema: { type: string, maxLength: 200 }
        - name: areaIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: categoryIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: typeIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: qualityCharacteristicIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: statuses
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: normReferenceIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: requirementPackageIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: priorityLevelIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: requiresTesting
          in: query
          schema:
            type: array
            maxItems: 100
            items:
              type: string
              enum: ['true', 'false']
          style: form
          explode: true
      responses:
        '200':
          description: Requirement list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [requirements]
      operationId: createRequirement
      summary: Create a requirement draft.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementCreateMutation' }
      responses:
        '201':
          description: Created requirement version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementCreateResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    get:
      tags: [requirements]
      operationId: getRequirement
      summary: Get a requirement with version history.
      responses:
        '200':
          description: Requirement detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementDetail' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [requirements]
      operationId: editRequirement
      summary: Edit a requirement draft.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementEditMutation' }
      responses:
        '200':
          description: Updated requirement version wrapper.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementMutationResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [requirements]
      operationId: archiveRequirement
      summary: Archive a requirement.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200':
          description: Archived requirement result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArchiveRequirementResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
      - $ref: '#/components/parameters/VersionNumber'
    get:
      tags: [requirements]
      operationId: getRequirementVersion
      summary: Get one requirement version.
      responses:
        '200':
          description: Requirement version detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementVersionResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/requirements/{id}/delete-draft:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: deleteRequirementDraft
      summary: Delete the current draft version.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200':
          description: Deleted draft result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteDraftResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: restoreRequirementVersion
      summary: Restore a historical requirement version.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [versionNumber]
              additionalProperties: false
              properties:
                versionNumber: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Restored version wrapper.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RestoreResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}/reactivate:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: reactivateRequirement
      summary: Reactivate an archived requirement.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirement-transitions/{id}:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: transitionRequirement
      summary: Transition a requirement to another status.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [statusId]
              additionalProperties: false
              properties:
                statusId: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Transition result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementMutationResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirement-areas:
    get:
      tags: [catalogs]
      operationId: listRequirementAreas
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-areas/{id}:
    parameters:
      - $ref: '#/components/parameters/RequirementAreaId'
    get:
      tags: [catalogs]
      operationId: getRequirementArea
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/requirement-categories:
    get:
      tags: [catalogs]
      operationId: listRequirementCategories
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-types:
    get:
      tags: [catalogs]
      operationId: listRequirementTypes
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-statuses:
    get:
      tags: [catalogs]
      operationId: listRequirementStatuses
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-packages:
    get:
      tags: [catalogs]
      operationId: listRequirementPackages
      parameters:
        - name: includeArchived
          in: query
          schema: { type: string, enum: ['true', 'false'] }
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/quality-characteristics:
    get:
      tags: [catalogs]
      operationId: listQualityCharacteristics
      parameters:
        - name: typeId
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/priority-levels:
    get:
      tags: [catalogs]
      operationId: listPriorityLevels
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/norm-references:
    get:
      tags: [catalogs]
      operationId: listNormReferences
      parameters:
        - name: includeArchived
          in: query
          schema: { type: string, enum: ['true', 'false'] }
        - name: includeIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: linked
          in: query
          schema: { type: string, enum: ['true', 'false'] }
        - name: statuses
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/norm-reference-actions/{id}/archive:
    parameters:
      - $ref: '#/components/parameters/NormReferenceId'
    post:
      tags: [catalogs]
      operationId: archiveNormReference
      summary: Archive a norm reference.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/norm-references/{id}/reactivate:
    parameters:
      - $ref: '#/components/parameters/NormReferenceId'
    post:
      tags: [catalogs]
      operationId: reactivateNormReference
      summary: Reactivate an archived norm reference.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: kravhantering_session

  parameters:
    RequirementId:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 80
        pattern: '^.+$'
      description: Numeric database id or stable requirement unique id.
    NormReferenceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    RequirementAreaId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VersionNumber:
      name: version
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Locale:
      name: locale
      in: query
      schema:
        type: string
        enum: [en, sv]
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum:
          - uniqueId
          - description
          - area
          - category
          - type
          - qualityCharacteristic
          - priorityLevel
          - status
          - version
    SortDirection:
      name: sortDirection
      in: query
      schema:
        type: string
        enum: [asc, desc]
    Origin:
      name: Origin
      in: header
      required: true
      schema:
        type: string
        enum: [http://localhost:3001]
    XRequestedWith:
      name: X-Requested-With
      in: header
      required: true
      schema:
        type: string
        enum: [XMLHttpRequest]

  responses:
    JsonObject:
      description: JSON object response.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/LooseObject' }
    Ok:
      description: Operation succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            additionalProperties: true
            properties:
              ok: { type: boolean }
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NoStoreBadRequest:
      description: Invalid request.
      headers:
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NoStoreUnauthorized:
      description: Authentication required.
      headers:
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NoStoreForbidden:
      description: Forbidden.
      headers:
        Cache-Control:
          schema:
            type: string
            enum: [no-store]
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    LooseObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        code: { type: string }
        detail: { type: string }
        details: {}
        error: { type: string }
    AnonymousSession:
      type: object
      required: [authenticated]
      additionalProperties: false
      properties:
        authenticated: { type: boolean, enum: [false] }
    AuthenticatedSession:
      type: object
      required: [authenticated, sub, hsaId, roles]
      additionalProperties: false
      properties:
        authenticated: { type: boolean, enum: [true] }
        sub: { type: string }
        hsaId: { type: string }
        givenName: { type: string, nullable: true }
        familyName: { type: string, nullable: true }
        name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        roles:
          type: array
          maxItems: 10
          items: { type: string }
        expiresAt: { type: number, nullable: true }
    HsaId:
      type: string
      minLength: 14
      maxLength: 31
      pattern: '^[A-Z]{2}[0-9]{10}-[A-Za-z0-9]+$'
      example: SE5560000001-kalle1
    PrivacyTarget:
      type: object
      required: [hsaId]
      additionalProperties: false
      properties:
        hsaId: { $ref: '#/components/schemas/HsaId' }
    PrivacyReplacement:
      type: object
      required: [displayName, hsaId]
      additionalProperties: false
      properties:
        displayName: { type: string, minLength: 1, maxLength: 450 }
        email: { type: string, format: email, maxLength: 450 }
        firstName: { type: string, maxLength: 450 }
        hsaId: { $ref: '#/components/schemas/HsaId' }
