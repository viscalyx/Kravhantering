openapi: 3.0.3
info:
  title: Kravhantering Requirements REST API
  version: 0.1.0
  description: >
    Static CI contract for the authenticated JSON REST API used by the
    requirements UI. This file is not served by the application at runtime.
servers:
  - url: http://localhost:3001
    description: Local prodlike CI server only.
tags:
  - name: auth
  - name: requirements
  - name: catalogs
security:
  - cookieSession: []
paths:
  /api/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentSession
      summary: Return the current session projection.
      security: []
      responses:
        '200':
          description: Current session projection.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnonymousSession'
                  - $ref: '#/components/schemas/AuthenticatedSession'

  /api/requirements:
    get:
      tags: [requirements]
      operationId: listRequirements
      summary: List requirements as JSON.
      parameters:
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
        - name: uniqueIdSearch
          in: query
          schema: { type: string, maxLength: 100 }
        - name: descriptionSearch
          in: query
          schema: { type: string, maxLength: 200 }
        - name: areaIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: categoryIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: typeIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: qualityCharacteristicIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: statuses
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: normReferenceIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: requirementPackageIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: riskLevelIds
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
        - name: requiresTesting
          in: query
          schema:
            type: array
            maxItems: 100
            items:
              type: string
              enum: ['true', 'false']
          style: form
          explode: true
      responses:
        '200':
          description: Requirement list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [requirements]
      operationId: createRequirement
      summary: Create a requirement draft.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementMutation' }
      responses:
        '201':
          description: Created requirement version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementVersion' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    get:
      tags: [requirements]
      operationId: getRequirement
      summary: Get a requirement with version history.
      responses:
        '200':
          description: Requirement detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [requirements]
      operationId: editRequirement
      summary: Edit a requirement draft.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequirementMutation' }
      responses:
        '200':
          description: Updated requirement version wrapper.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementMutationResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [requirements]
      operationId: archiveRequirement
      summary: Archive a requirement.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
      - $ref: '#/components/parameters/VersionNumber'
    get:
      tags: [requirements]
      operationId: getRequirementVersion
      summary: Get one requirement version.
      responses:
        '200':
          description: Requirement version detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementVersionResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/requirements/{id}/delete-draft:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: deleteRequirementDraft
      summary: Delete the current draft version.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200':
          description: Deleted draft result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementVersion' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: restoreRequirementVersion
      summary: Restore a historical requirement version.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [versionNumber]
              additionalProperties: false
              properties:
                versionNumber: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Restored version wrapper.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RestoreResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirements/{id}/reactivate:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: reactivateRequirement
      summary: Reactivate an archived requirement.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirement-transitions/{id}:
    parameters:
      - $ref: '#/components/parameters/RequirementId'
    post:
      tags: [requirements]
      operationId: transitionRequirement
      summary: Transition a requirement to another status.
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/XRequestedWith'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [statusId]
              additionalProperties: false
              properties:
                statusId: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Transition result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequirementMutationResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/requirement-areas:
    get:
      tags: [catalogs]
      operationId: listRequirementAreas
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-categories:
    get:
      tags: [catalogs]
      operationId: listRequirementCategories
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-types:
    get:
      tags: [catalogs]
      operationId: listRequirementTypes
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-statuses:
    get:
      tags: [catalogs]
      operationId: listRequirementStatuses
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/requirement-packages:
    get:
      tags: [catalogs]
      operationId: listRequirementPackages
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/quality-characteristics:
    get:
      tags: [catalogs]
      operationId: listQualityCharacteristics
      parameters:
        - name: typeId
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/risk-levels:
    get:
      tags: [catalogs]
      operationId: listRiskLevels
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/norm-references:
    get:
      tags: [catalogs]
      operationId: listNormReferences
      parameters:
        - name: linked
          in: query
          schema: { type: string, enum: ['true', 'false'] }
        - name: statuses
          in: query
          schema:
            type: array
            maxItems: 100
            items: { type: integer, minimum: 1 }
          style: form
          explode: true
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owners:
    get:
      tags: [catalogs]
      operationId: listOwnerOptions
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owners/all:
    get:
      tags: [catalogs]
      operationId: listOwners
      responses:
        '200': { $ref: '#/components/responses/JsonObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: kravhantering_session

  parameters:
    RequirementId:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 80
      description: Numeric database id or stable requirement unique id.
    VersionNumber:
      name: version
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Locale:
      name: locale
      in: query
      schema:
        type: string
        enum: [en, sv]
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum:
          - uniqueId
          - description
          - area
          - category
          - type
          - qualityCharacteristic
          - riskLevel
          - status
          - version
    SortDirection:
      name: sortDirection
      in: query
      schema:
        type: string
        enum: [asc, desc]
    Origin:
      name: Origin
      in: header
      required: true
      schema:
        type: string
        enum: [http://localhost:3001]
    XRequestedWith:
      name: X-Requested-With
      in: header
      required: true
      schema:
        type: string
        enum: [XMLHttpRequest]

  responses:
    JsonObject:
      description: JSON object response.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/LooseObject' }
    Ok:
      description: Operation succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            additionalProperties: true
            properties:
              ok: { type: boolean }
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    LooseObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        code: { type: string }
        detail: { type: string }
        details: {}
        error: { type: string }
    AnonymousSession:
      type: object
      required: [authenticated]
      additionalProperties: false
      properties:
        authenticated: { type: boolean, enum: [false] }
    AuthenticatedSession:
      type: object
      required: [authenticated, sub, hsaId, roles]
      additionalProperties: false
      properties:
        authenticated: { type: boolean, enum: [true] }
        sub: { type: string }
        hsaId: { type: string }
        givenName: { type: string, nullable: true }
        familyName: { type: string, nullable: true }
        name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        roles:
          type: array
          items: { type: string }
        expiresAt: { type: number, nullable: true }
    RequirementListResponse:
      type: object
      required: [requirements]
      additionalProperties: true
      properties:
        pagination:
          type: object
          additionalProperties: true
        requirements:
          type: array
          items: { $ref: '#/components/schemas/RequirementSummary' }
    RequirementSummary:
      type: object
      required: [id, uniqueId]
      additionalProperties: true
      properties:
        id: { type: integer }
        uniqueId: { type: string }
        isArchived: { type: boolean }
        version:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RequirementVersion'
    RequirementDetail:
      type: object
      required: [id, uniqueId]
      additionalProperties: true
      properties:
        id: { type: integer }
        uniqueId: { type: string }
        isArchived: { type: boolean }
        version:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RequirementVersion'
        versions:
          type: array
          items: { $ref: '#/components/schemas/RequirementVersion' }
    RequirementVersionResponse:
      type: object
      required: [uniqueId, version]
      additionalProperties: true
      properties:
        uniqueId: { type: string }
        version: { $ref: '#/components/schemas/RequirementVersion' }
    RequirementMutationResult:
      type: object
      required: [version]
      additionalProperties: true
      properties:
        id: { type: integer }
        uniqueId: { type: string }
        version: { $ref: '#/components/schemas/RequirementVersion' }
    RestoreResult:
      type: object
      required: [ok, version]
      additionalProperties: true
      properties:
        ok: { type: boolean }
        version: { $ref: '#/components/schemas/RequirementVersion' }
    RequirementVersion:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer }
        versionNumber: { type: integer }
        description: { type: string, nullable: true }
        acceptanceCriteria: { type: string, nullable: true }
        verificationMethod: { type: string, nullable: true }
        requiresTesting: { type: boolean }
        status: { type: integer, nullable: true }
        statusNameSv: { type: string, nullable: true }
        statusNameEn: { type: string, nullable: true }
        revisionToken: { type: string }
    RequirementMutation:
      type: object
      required: [areaId, description, requiresTesting]
      additionalProperties: true
      properties:
        acceptanceCriteria: { type: string, maxLength: 4000 }
        areaId: { type: integer, minimum: 1 }
        baseRevisionToken: { type: string, nullable: true, maxLength: 200 }
        baseVersionId: { type: integer, minimum: 1, nullable: true }
        categoryId: { type: integer, minimum: 1 }
        description: { type: string, minLength: 1, maxLength: 4000 }
        normReferenceIds:
          type: array
          maxItems: 100
          items: { type: integer, minimum: 1 }
        ownerId: { type: string, maxLength: 80 }
        qualityCharacteristicId: { type: integer, minimum: 1 }
        requirementPackageIds:
          type: array
          maxItems: 100
          items: { type: integer, minimum: 1 }
        requiresTesting: { type: boolean }
        riskLevelId: { type: integer, minimum: 1 }
        typeId: { type: integer, minimum: 1 }
        verificationMethod: { type: string, maxLength: 4000 }
