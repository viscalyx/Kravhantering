name: kravhantering-app-node

services:
  app-runtime:
    image: ${APP_RUNTIME_IMAGE_REF:?set APP_RUNTIME_IMAGE_REF}
    env_file:
      - /etc/kravhantering/app.env
    networks:
      - kravhantering-internal
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE_REF:?set NGINX_IMAGE_REF}
    depends_on:
      - app-runtime
    environment:
      NGINX_RESOLVER: ${NGINX_RESOLVER:-10.89.0.1}
    ports:
      - "${NGINX_HTTP_BIND:-127.0.0.1:8080}:8080"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/templates/app-node-http.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../api-docs:/usr/share/nginx/html/api-docs:ro
    networks:
      - kravhantering-internal
    restart: unless-stopped

networks:
  kravhantering-internal:
    name: kravhantering-internal
