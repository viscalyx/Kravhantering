# cSpell:words fullchain privkey

name: kravhantering-app-node

services:
  app-runtime:
    image: ${APP_RUNTIME_IMAGE_REF:?set APP_RUNTIME_IMAGE_REF}
    env_file:
      - /etc/kravhantering/app.env
    networks:
      - kravhantering-internal
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE_REF:?set NGINX_IMAGE_REF}
    depends_on:
      - app-runtime
    environment:
      NGINX_RESOLVER: ${NGINX_RESOLVER:-10.89.0.1}
    ports:
      - "${NGINX_HTTPS_BIND:-443:443}"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/templates/app-node-tls.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/kravhantering/tls/fullchain.pem:/etc/nginx/tls/fullchain.pem:ro
      - /etc/kravhantering/tls/privkey.pem:/etc/nginx/tls/privkey.pem:ro
    networks:
      - kravhantering-internal
    restart: unless-stopped

networks:
  kravhantering-internal:
    name: kravhantering-internal
