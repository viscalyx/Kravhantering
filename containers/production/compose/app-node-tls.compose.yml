# cSpell:words fullchain privkey

name: kravhantering-app-node

services:
  app-runtime:
    image: ${APP_RUNTIME_IMAGE_REF:?set APP_RUNTIME_IMAGE_REF}
    env_file:
      - /etc/kravhantering/app.env
    networks:
      - kravhantering-internal
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE_REF:?set NGINX_IMAGE_REF}
    depends_on:
      - app-runtime
    ports:
      - "${NGINX_HTTPS_BIND:-443:443}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx/conf.d/app-node-tls.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - /etc/kravhantering/tls/fullchain.pem:/etc/nginx/tls/fullchain.pem:ro,Z
      - /etc/kravhantering/tls/privkey.pem:/etc/nginx/tls/privkey.pem:ro,Z
    networks:
      - kravhantering-internal
    restart: unless-stopped

networks:
  kravhantering-internal:
