# Generated CSV/PDF routes may run for up to the Admin-configured 600 seconds.
# Keep 60 seconds of proxy margin without changing the timeout for other routes.
# Gives the potentially slow generated-output routes a longer Nginx timeout.
location ~ ^/(?:api/requirements/export|api/requirements-specifications/[0-9]+/exports|(?:sv|en)/requirements/reports/pdf/list)$ {
    proxy_pass http://app_runtime_upstream;
    proxy_http_version 1.1;
    proxy_read_timeout 660s;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}
