name: kravhantering-devcontainer

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      idp:
        # Don't block on healthy — Keycloak takes ~30s to start and would
        # slow every devcontainer attach. The app boots fine without it;
        # OIDC discovery happens lazily on first sign-in.
        condition: service_started
    volumes:
      # Mount the root folder that contains .git
      - ..:/workspace:cached
      # Persistent npm cache for faster installs across rebuilds (commented out - not needed for infrequent rebuilds)
      # - npm-cache:/home/vscode/.npm

      # Persist SQLite state/logs within the default Codex HOME
      - type: volume
        source: codex-state
        target: /home/vscode/.codex/sqlite

      # Bind-mount only the subdirectories you want to persist on the host
      - type: bind
        source: ${HOME}/.codex/sessions
        target: /home/vscode/.codex/sessions
      - type: bind
        source: ${HOME}/.codex/plugins
        target: /home/vscode/.codex/plugins
      - type: bind
        source: ${HOME}/.codex/skills
        target: /home/vscode/.codex/skills
      - type: bind
        source: ${HOME}/.codex/rules
        target: /home/vscode/.codex/rules

      # Re-use auth file from host
      - type: bind
        source: ${HOME}/.codex/auth.json
        target: /home/vscode/.codex/auth.json

      # Keep runtime temp wrappers container-local
      - codex-tmp:/home/vscode/.codex/tmp
    # Keep container running
    command: sleep infinity
    env_file:
    - path: .env
      required: false
    environment:
      DATABASE_READONLY_PASSWORD_ENV: ${DATABASE_READONLY_PASSWORD_ENV:-DATABASE_READONLY_PASSWORD}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
    extra_hosts:
      # The release-smoke runner reaches nginx through Podman's published
      # 443 port on the devcontainer loopback address.
      - "kravhantering.test:127.0.0.1"
    devices:
      # Required by rootless Podman when it uses fuse-overlayfs for nested
      # local container storage (e.g. for the release-smoke container stack).
      - /dev/fuse:/dev/fuse
      # Required by slirp4netns for rootless Podman networking.
      - /dev/net/tun:/dev/net/tun
    # Ports are forwarded via devcontainer.json forwardPorts (VS Code handles this)
    # Proper init system for signal handling and zombie process reaping
    init: true

  db:
    image: mcr.microsoft.com/mssql/server:2025-CU5-ubuntu-24.04
    env_file:
    - path: .env
      required: false
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Copy .devcontainer/.env.example to .devcontainer/.env and set MSSQL_SA_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 5s
      retries: 20
      start_period: 10s
      timeout: 5s
    ports:
      - "${SQLSERVER_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver-devcontainer-data:/var/opt/mssql

  idp:
    # Local OIDC IdP (Keycloak) for development. Mirrors
    # docker-compose.idp.yml so devcontainer users get auth-on by default
    # per the plan in docs/plan-auth.md. The realm `kravhantering-dev` is
    # imported on every start from `dev/keycloak/realm-kravhantering-dev.json`
    # — changes made via the admin UI on http://localhost:8080 are NOT
    # persisted across restarts.
    # See https://www.keycloak.org/docs/latest/upgrading/
    image: quay.io/keycloak/keycloak:26.6.2-2
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    env_file:
    - path: .env
      required: false
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8080}:8080"
    volumes:
      - ../dev/keycloak:/opt/keycloak/data/import:ro

volumes:
  sqlserver-devcontainer-data:
  codex-tmp:
  codex-state:
