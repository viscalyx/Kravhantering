name: kravhantering-devcontainer

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      - db
    volumes:
      # Mount the root folder that contains .git
      - ..:/workspace:cached
      # Persistent npm cache for faster installs across rebuilds (commented out - not needed for infrequent rebuilds)
      # - npm-cache:/home/vscode/.npm
      - type: bind
        source: ${HOME}/.codex
        target: /home/vscode/.codex
        bind:
          create_host_path: true
      # Mount the shared SQLite volume read-only so VS Code tools can inspect the DB.
      - sqlite-db-data:/var/lib/kravhantering:ro
    # Keep container running
    command: sleep infinity
    # Set environment variables
    environment:
      - DATABASE_URL=http://db:9000
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    # Ports are forwarded via devcontainer.json forwardPorts (VS Code handles this)
    # Proper init system for signal handling and zombie process reaping
    init: true

  db:
    image: python:3.12-slim
    working_dir: /workspace
    command:
      [
        "python3",
        "/workspace/scripts/sqlite_http_server.py",
        "--host",
        "0.0.0.0",
        "--port",
        "9000",
        "--db-file",
        "/var/lib/kravhantering/devcontainer.sqlite"
      ]
    environment:
      - PYTHONUNBUFFERED=1
      - SQLITE_PROXY_QUIET=1
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz', timeout=2).read()"
        ]
      interval: 2s
      retries: 30
      timeout: 2s
    volumes:
      - ..:/workspace:cached,ro
      - sqlite-db-data:/var/lib/kravhantering

volumes:
  sqlite-db-data:
