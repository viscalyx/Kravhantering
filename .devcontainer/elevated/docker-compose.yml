name: kravhantering-devcontainer-elevated

services:
  app:
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      idp:
        # Don't block on healthy — Keycloak takes ~30s to start and would
        # slow every devcontainer attach. The app boots fine without it;
        # OIDC discovery happens lazily on first sign-in.
        condition: service_started
      kong:
        condition: service_healthy
    volumes:
      # Mount the root folder that contains .git
      - ../..:/workspace:cached
      # Persistent npm cache for faster installs across rebuilds (commented out - not needed for infrequent rebuilds)
      # - npm-cache:/home/vscode/.npm

      # Persist SQLite state/logs within the default Codex HOME
      - type: volume
        source: codex-state
        target: /home/vscode/.codex/sqlite

      # Bind-mount only the subdirectories you want to persist on the host
      - type: bind
        source: ${HOME}/.codex/sessions
        target: /home/vscode/.codex/sessions
      - type: bind
        source: ${HOME}/.codex/plugins
        target: /home/vscode/.codex/plugins
      - type: bind
        source: ${HOME}/.codex/skills
        target: /home/vscode/.codex/skills
      - type: bind
        source: ${HOME}/.codex/rules
        target: /home/vscode/.codex/rules

      # Re-use auth file from host
      - type: bind
        source: ${HOME}/.codex/auth.json
        target: /home/vscode/.codex/auth.json

      # Keep runtime temp wrappers container-local
      - codex-tmp:/home/vscode/.codex/tmp
    # Keep container running
    command: sleep infinity
    env_file:
    # Even if we reference the parent .env here, we still need to copy it to the elevated folder because docker-compose doesn't seem to support referencing files outside the compose file's directory for env_file.
    - path: ../.env
      required: false
    environment:
      DATABASE_READONLY_PASSWORD_ENV: ${DATABASE_READONLY_PASSWORD_ENV:-DATABASE_READONLY_PASSWORD}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}
      HSA_PERSON_LOOKUP_TIMEOUT_MS: ${HSA_PERSON_LOOKUP_TIMEOUT_MS:-5000}
      HSA_PERSON_LOOKUP_URL: ${HSA_PERSON_LOOKUP_URL:-http://kong:8000/hsa/person-records/lookup}
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      DOTNET_CLI_TELEMETRY_OPTOUT: ${DOTNET_CLI_TELEMETRY_OPTOUT:-1}
      DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE: ${DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE:-true}
      DOTNET_SKIP_WORKLOAD_INTEGRITY_CHECK: ${DOTNET_SKIP_WORKLOAD_INTEGRITY_CHECK:-true}
    extra_hosts:
      # The release-smoke runner reaches nginx through Podman's published
      # 443 port on the devcontainer loopback address.
      - "kravhantering.test:127.0.0.1"
    # WARNING: This profile grants elevated privileges (SYS_ADMIN,
    # seccomp=unconfined) and is intended only for trusted code.
    # It must remain opt-in — do not use as the default configuration.
    cap_add:
      # Allow bwrap/unshare to mount /proc inside its namespace so that
      # sandbox-wrapped agent commands work without falling back to
      # unsandboxed execution.
      - SYS_ADMIN
    security_opt:
      # Allow nested tool sandboxes (for example Bubblewrap/unshare) without
      # granting the whole devcontainer privileged mode.
      - seccomp=unconfined
      # Docker masks certain /proc paths (kcore, keys, etc.) by default.
      # The kernel refuses to mount a new procfs in a child PID namespace
      # when the parent proc has masked entries, which breaks bwrap
      # --unshare-pid.  Unmasking system paths fixes this narrowly.
      - systempaths=unconfined
    devices:
      # Required by rootless Podman when it uses fuse-overlayfs for nested
      # local container storage (e.g. for the release-smoke container stack).
      - /dev/fuse:/dev/fuse
      # Required by slirp4netns for rootless Podman networking.
      - /dev/net/tun:/dev/net/tun
    # Ports are forwarded via devcontainer.json forwardPorts (VS Code handles this)
    # Proper init system for signal handling and zombie process reaping
    init: true

  db:
    image: mcr.microsoft.com/mssql/server:2025-CU6-ubuntu-24.04
    env_file:
    - path: ../.env
      required: false
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Copy .devcontainer/.env.example to .devcontainer/elevated/.env and set MSSQL_SA_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 5s
      retries: 20
      start_period: 10s
      timeout: 5s
    ports:
      - "${SQLSERVER_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver-elevated-devcontainer-data:/var/opt/mssql

  idp:
    # Local OIDC IdP (Keycloak) for development. Mirrors
    # docker-compose.idp.yml so devcontainer users get auth-on by default
    # per the plan in docs/plan-auth.md. The realm `kravhantering-dev` is
    # imported on every start from `dev/keycloak/realm-kravhantering-dev.json`
    # — changes made via the admin UI on http://localhost:8080 are NOT
    # persisted across restarts.
    # See https://www.keycloak.org/docs/latest/upgrading/
    image: quay.io/keycloak/keycloak:26.6.3-0
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    env_file:
    - path: ../.env
      required: false
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8080}:8080"
    volumes:
      - ../../dev/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -ec '{ printf "GET /realms/kravhantering-dev/.well-known/openid-configuration HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3;
          grep -m 1 " 200 " <&3 >/dev/null; } 3<>/dev/tcp/localhost/8080 &&
          { printf "GET /realms/kravhantering-dev/protocol/openid-connect/certs HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3;
          grep -m 1 " 200 " <&3 >/dev/null; } 3<>/dev/tcp/localhost/8080'
      interval: 5s
      retries: 30
      start_period: 10s
      timeout: 5s

  kong:
    image: docker.io/kong/kong-gateway:3.10.0.8-20260210-ubuntu@sha256:031e2abf5b973db9ce5d94ea30a46d4b29b3879088118e0b1c0ff66b8c814853
    depends_on:
      hsa-person-lookup-adapter:
        condition: service_healthy
    environment:
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ${WORKSPACE_HOST_ROOT:-../..}/containers/kong/kong.yml:/kong/declarative/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      retries: 12
      start_period: 10s
      timeout: 5s

  hsa-mtls-cert-generator:
    build:
      context: ${WORKSPACE_BUILD_ROOT:-../..}/containers/hsa-person-lookup-adapter
      dockerfile: Dockerfile
    command: npm run generate-certs
    user: "0:0"
    volumes:
      - hsa-mtls-certs:/run/hsa-mtls

  hsa-person-lookup-adapter:
    build:
      context: ${WORKSPACE_BUILD_ROOT:-../..}/containers/hsa-person-lookup-adapter
      dockerfile: Dockerfile
    depends_on:
      hsa-directory-mock:
        condition: service_healthy
      hsa-mtls-cert-generator:
        condition: service_completed_successfully
    environment:
      HSA_SOAP_ENDPOINT_URL: https://hsa-directory-mock:8443/svr-hsaws2/hsaws
      HSA_SOAP_TIMEOUT_MS: 5000
      PORT: 8080
    volumes:
      - hsa-mtls-certs:/run/hsa-mtls:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--input-type=module",
          "-e",
          "const response = await fetch('http://127.0.0.1:8080/health'); if (!response.ok) process.exit(1);"
        ]
      interval: 10s
      retries: 12
      start_period: 10s
      timeout: 5s

  hsa-directory-mock:
    build:
      context: ${WORKSPACE_BUILD_ROOT:-../..}/containers/hsa-directory-mock
      dockerfile: Dockerfile
    depends_on:
      hsa-mtls-cert-generator:
        condition: service_completed_successfully
    environment:
      PORT: 8443
    volumes:
      - hsa-mtls-certs:/run/hsa-mtls:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--input-type=module",
          "-e",
          "process.env.NODE_TLS_REJECT_UNAUTHORIZED='0'; const response = await fetch('https://127.0.0.1:8443/health'); if (!response.ok) process.exit(1);"
        ]
      interval: 10s
      retries: 12
      start_period: 10s
      timeout: 5s

volumes:
  sqlserver-elevated-devcontainer-data:
  codex-tmp:
  codex-state:
  hsa-mtls-certs:
