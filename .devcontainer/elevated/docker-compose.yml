name: kravhantering-devcontainer-elevated

services:
  app:
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      idp:
        # Don't block on healthy — Keycloak takes ~30s to start and would
        # slow every devcontainer attach. The app boots fine without it;
        # OIDC discovery happens lazily on first sign-in.
        condition: service_started
    volumes:
      - ../..:/workspace:cached
      # Persistent npm cache for faster installs across rebuilds (commented out - not needed for infrequent rebuilds)
      # - npm-cache:/home/vscode/.npm
      - type: bind
        source: ${HOME}/.codex
        target: /home/vscode/.codex
        bind:
          create_host_path: true
      # Keep Codex runtime temp wrappers container-local.
      - codex-tmp:/home/vscode/.codex/tmp
    command: sleep infinity
    env_file:
    # TODO: Even if we reference the parent .env here, we still need to copy it to the elevated folder because docker-compose doesn't seem to support referencing files outside the compose file's directory for env_file.
    - path: ../.env
      required: false
    environment:
      DATABASE_READONLY_PASSWORD_ENV: ${DATABASE_READONLY_PASSWORD_ENV:-DATABASE_READONLY_PASSWORD}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
    # WARNING: This profile grants elevated privileges (SYS_ADMIN,
    # seccomp=unconfined) and is intended only for trusted code.
    # It must remain opt-in — do not use as the default configuration.
    cap_add:
      # Allow bwrap/unshare to mount /proc inside its namespace so that
      # sandbox-wrapped agent commands work without falling back to
      # unsandboxed execution.
      - SYS_ADMIN
    security_opt:
      # Allow nested tool sandboxes (for example Bubblewrap/unshare) without
      # granting the whole devcontainer privileged mode.
      - seccomp=unconfined
      # Docker masks certain /proc paths (kcore, keys, etc.) by default.
      # The kernel refuses to mount a new procfs in a child PID namespace
      # when the parent proc has masked entries, which breaks bwrap
      # --unshare-pid.  Unmasking system paths fixes this narrowly.
      - systempaths=unconfined
    init: true

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
    - path: ../.env
      required: false
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Copy .devcontainer/.env.example to .devcontainer/elevated/.env and set MSSQL_SA_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 5s
      retries: 20
      start_period: 10s
      timeout: 5s
    ports:
      - "${SQLSERVER_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver-elevated-devcontainer-data:/var/opt/mssql

  idp:
    # Local OIDC IdP (Keycloak) for development. Mirrors
    # docker-compose.idp.yml so devcontainer users get auth-on by default
    # per the plan in docs/plan-auth.md. The realm `kravhantering-dev` is
    # imported on every start from `dev/keycloak/realm-kravhantering-dev.json`
    # — changes made via the admin UI on http://localhost:8080 are NOT
    # persisted across restarts.
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    env_file:
    - path: ../.env
      required: false
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8080}:8080"
    volumes:
      - ../../dev/keycloak:/opt/keycloak/data/import:ro

volumes:
  sqlserver-elevated-devcontainer-data:
  codex-tmp:
