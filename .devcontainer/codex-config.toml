# User-level Codex settings required by the Kravhantering devcontainer.
# The devcontainer postCreateCommand copies this to user configuration (~/.codex/config.toml).
# Then Codex automatically layers the project’s .codex/config.toml on top of it.

approval_policy = "never"
default_permissions = "kravhantering-devcontainer"

[projects."/workspace"]
trust_level = "trusted"

[permissions.kravhantering-devcontainer]
description = "Workspace access with Kravhantering devcontainer service network."
extends = ":workspace"

[permissions.kravhantering-devcontainer.network]
enabled = true
allow_local_binding = true

[permissions.kravhantering-devcontainer.network.domains]
"db" = "allow"
"idp" = "allow"
"kong" = "allow"
"hsa-directory-mock" = "allow"
"hsa-person-lookup-adapter" = "allow"
"localhost" = "allow"
"127.0.0.1" = "allow"
"::1" = "allow"
